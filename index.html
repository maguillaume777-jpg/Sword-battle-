<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sword Battle - Full Version Fixed</title>
    <style>
        :root { --primary: #00e676; --accent: #ffd700; --bg-dark: #1a1a1a; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', Roboto, Arial, sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #menu, #game-over, #shop-menu { 
            position: absolute; inset: 0; 
            background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 2000; color: white; backdrop-filter: blur(10px); 
        }
        #game-over, #shop-menu { display: none; }

        .menu-box { 
            background: rgba(35, 35, 35, 0.9); padding: 30px; border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.1); width: 340px; text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
        }

        #openShopBtn { 
            position: absolute; top: 25px; right: 25px; padding: 12px 24px; background: var(--accent); 
            color: #000; border-radius: 14px; font-weight: 900; border: none; cursor: pointer; z-index: 2501;
        }

        .shop-container { width: 90%; max-width: 500px; max-height: 85vh; background: #222; border-radius: 24px; border: 2px solid #444; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; overflow-y: auto; padding: 10px; }
        .shop-item { background: #2a2a2a; padding: 15px; border-radius: 18px; border: 2px solid #3d3d3d; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .shop-item.selected { border-color: #2196f3; background: #333; }
        
        .preview-canvas { width: 80px; height: 80px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .coin-count { color: var(--accent); font-weight: bold; font-size: 20px; margin-bottom: 15px; }
        input, select { width: 90%; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #444; background: #111; color: white; }
        
        button.main-btn { width: 95%; padding: 15px; margin-top: 10px; border-radius: 12px; border: none; font-size: 18px; background: var(--primary); font-weight: bold; cursor: pointer; color: #000; }

        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 15px 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); display: none; z-index: 1000; }
        #right-ui { position: absolute; top: 20px; right: 20px; display: none; flex-direction: column; gap: 10px; z-index: 1000; align-items: flex-end; }
        #minimap-container { width: 150px; height: 150px; background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; overflow: hidden; }

        .touch-ctrl { position: absolute; border-radius: 50%; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); display: none; z-index: 1500; align-items: center; justify-content: center; }
        #joystick-base { bottom: 50px; left: 50px; width: 120px; height: 120px; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; opacity: 0.4; }
        #dash-btn { bottom: 170px; right: 50px; width: 70px; height: 70px; color: white; font-weight: bold; }
        #atk-btn { bottom: 40px; right: 40px; width: 110px; height: 110px; background: rgba(255, 23, 68, 0.3); color: white; font-weight: bold; }
        
        #bush-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 900; background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.85) 100%); opacity: 0; transition: opacity 0.4s; }
    </style>
</head>
<body>

    <div id="bush-overlay"></div>
    <div id="menu">
        <button id="openShopBtn">SHOP</button>
        <div class="menu-box">
            <h1 style="color:var(--primary); margin: 0 0 5px 0;">SWORD BATTLE</h1>
            <div class="coin-count" id="menu-coins">Coins: 0</div>
            <input type="text" id="username" placeholder="Enter Name..." maxlength="12">
            <select id="worldSelect">
                <option value="grass">Grassy Plains</option>
                <option value="lava">Volcanic Ember</option>
                <option value="ocean">Deep Ocean</option>
            </select>
            <button id="startBtn" class="main-btn">BATTLE NOW</button>
        </div>
    </div>

    <div id="shop-menu">
        <div class="shop-container">
            <h2 style="margin:0; color:var(--accent); text-align:center;">SKIN SHOP</h2>
            <div id="shop-coin-display" class="coin-count" style="text-align:center;">Coins: 0</div>
            <div class="shop-grid" id="shop-grid"></div>
            <button id="closeShopBtn" style="background:#444; color:white; border:none; padding:12px; border-radius:10px; margin-top:10px;">BACK</button>
        </div>
    </div>

    <div id="game-over">
        <div class="menu-box">
            <h1 style="color:#ff1744">DEFEATED</h1>
            <p id="final-stats">Kills: 0 | Tier: 1</p>
            <button id="respawnBtn" class="main-btn">REMATCH</button>
            <button id="menuBtn" style="background:transparent; color:white; border:1px solid #555; width:95%; padding:12px; margin-top:10px; border-radius:10px;">HOME</button>
        </div>
    </div>

    <div id="ui">
        <div id="ui-name-static" style="font-weight:900; color:var(--primary); font-size: 18px;">Player</div>
        <div id="xp-display" style="font-size:12px; opacity:0.8;">Tier 1: 0 / 100</div>
        <div style="display: flex; gap: 15px;">
            <div id="score" style="font-size:14px; font-weight:bold; color:#fff;">Kills: 0</div>
            <div id="ingame-coins" style="font-size:14px; font-weight:bold; color:var(--accent);">Coins: 0</div>
        </div>
    </div>

    <div id="right-ui">
        <div id="minimap-container"><canvas id="minimap"></canvas></div>
    </div>

    <div id="joystick-base" class="touch-ctrl"><div id="joystick-stick"></div></div>
    <div id="dash-btn" class="touch-ctrl">DASH</div>
    <div id="atk-btn" class="touch-ctrl">SWING</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bushOverlay = document.getElementById('bush-overlay');
        const miniCanvas = document.getElementById('minimap');
        const miniCtx = miniCanvas.getContext('2d');

        const menu = document.getElementById('menu'), gameOverScreen = document.getElementById('game-over'), shopMenu = document.getElementById('shop-menu');
        const uiLayer = document.getElementById('ui'), rightUI = document.getElementById('right-ui');
        const joyBase = document.getElementById('joystick-base'), joyStick = document.getElementById('joystick-stick');

        let w = canvas.width = window.innerWidth, h = canvas.height = window.innerHeight;
        let gameActive = false, menuActive = true, kills = 0, sessionCoins = 0;
        const joyState = { x: 0, y: 0, active: false, id: null };
        const WORLD_SIZE = 6000; 
        const camera = { x: WORLD_SIZE/2, y: WORLD_SIZE/2, zoom: 0.8 };
        let bushes = [], bots = [], xpGems = [], damageTexts = [];

        let totalCoins = parseInt(localStorage.getItem('sb_coins')) || 0;
        let ownedSkins = JSON.parse(localStorage.getItem('sb_owned')) || ['Default'];
        let selectedSkinName = localStorage.getItem('sb_selected') || 'Default';

        const skins = {
            'Default': { color: '#2196f3', sword: '#BDC3C7', hilt: '#F1C40F', price: 0 },
            'Crimson': { color: '#d32f2f', sword: '#E74C3C', hilt: '#2C3E50', price: 500 },
            'Emerald': { color: '#2e7d32', sword: '#2ECC71', hilt: '#27AE60', price: 1200 },
            'Void': { color: '#4a148c', sword: '#9B59B6', hilt: '#000000', price: 2500 },
            'Gold': { color: '#ffc107', sword: '#FFF176', hilt: '#FF6F00', price: 5000 }
        };

        const BOT_BASE_SKIN = { color: '#616161', sword: '#ff1744', hilt: '#212121' };

        function renderSword(c, x, y, s, angle, bladeCol, hiltCol) {
            c.save(); c.translate(x, y); c.rotate(angle);
            c.fillStyle = bladeCol; c.strokeStyle = '#000'; c.lineWidth = 1.5 * s;
            c.beginPath(); c.moveTo(15*s, -11*s); c.lineTo(85*s, -6*s); c.lineTo(100*s, 0); c.lineTo(85*s, 6*s); c.lineTo(15*s, 11*s); c.closePath();
            c.fill(); c.stroke();
            c.fillStyle = hiltCol; c.fillRect(10*s, -15*s, 8*s, 30*s); c.strokeRect(10*s, -15*s, 8*s, 30*s);
            c.fillStyle = '#5D4037'; c.fillRect(-10*s, -4*s, 20*s, 8*s); c.strokeRect(-10*s, -4*s, 20*s, 8*s);
            c.restore();
        }

        const themes = {
            grass: { bg: '#235e27', gem: '#ffd700', bush: 'rgba(25, 80, 25, 0.7)' },
            lava: { bg: '#2b0a08', gem: '#ffab00', bush: 'rgba(40, 10, 5, 0.8)' },
            ocean: { bg: '#001a33', gem: '#00e5ff', bush: 'rgba(0, 30, 50, 0.6)' }
        };
        let currentTheme = themes.grass;

        const player = {
            id: 'p1', x: 3000, y: 3000, radius: 30, hp: 150, maxHp: 150, color: '#2196f3',
            speed: 8, angle: 0, isAttacking: false, swingProgress: 0, hitList: new Set(),
            dashTimer: 0, dashCooldown: 0, dashAngle: 0, afterimages: [],
            kx: 0, ky: 0, stunTimer: 0, xp: 0, nextLevel: 100, tier: 1, scale: 1, isPlayer: true
        };

        function spawnBot() {
            const tier = Math.floor(Math.random() * 2) + 1;
            bots.push({
                id: Math.random().toString(36), x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE,
                radius: 30 * (1+(tier-1)*0.35), hp: 100*tier, maxHp: 100*tier, color: BOT_BASE_SKIN.color, name: "Bot",
                speed: 4.2, angle: Math.random()*Math.PI*2, isAttacking: false, swingProgress: 0, hitList: new Set(),
                kx: 0, ky: 0, stunTimer: 0, tier: tier, scale: 1+(tier-1)*0.35, afterimages: [],
                swordColor: BOT_BASE_SKIN.sword, hiltColor: BOT_BASE_SKIN.hilt, attackCooldown: 0, wanderTime: 0
            });
        }

        function spawnGem() { xpGems.push({ x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE, val: 15 }); }
        function addDamageText(x, y, text) { damageTexts.push({ x, y, text, life: 1.0 }); }

        document.getElementById('startBtn').onclick = () => {
            currentTheme = themes[document.getElementById('worldSelect').value];
            const s = skins[selectedSkinName];
            player.color = s.color; player.swordColor = s.sword; player.hiltColor = s.hilt;
            gameActive = true; menu.style.display = 'none'; uiLayer.style.display = 'block'; rightUI.style.display = 'flex';
            document.querySelectorAll('.touch-ctrl').forEach(el => el.style.display = 'flex');
            resetGame();
        };

        function resetGame() {
            player.hp = 150; player.xp = 0; player.tier = 1; player.scale = 1; player.radius = 30; player.nextLevel = 100; kills = 0; sessionCoins = 0;
            bots = []; for(let i=0; i<18; i++) spawnBot();
            xpGems = []; for(let i=0; i<180; i++) spawnGem();
            bushes = []; for(let i=0; i<40; i++) bushes.push({x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE, r: 80+Math.random()*40});
        }

        joyBase.addEventListener('touchstart', (e) => { joyState.active = true; joyState.id = e.changedTouches[0].identifier; });
        window.addEventListener('touchmove', (e) => {
            if(!joyState.active) return;
            const t = Array.from(e.changedTouches).find(tt => tt.identifier === joyState.id);
            if(!t) return;
            const r = joyBase.getBoundingClientRect(), dx = t.clientX - (r.left + 60), dy = t.clientY - (r.top + 60);
            const dist = Math.min(50, Math.hypot(dx, dy)), a = Math.atan2(dy, dx);
            joyState.x = (Math.cos(a)*dist)/50; joyState.y = (Math.sin(a)*dist)/50;
            joyStick.style.transform = `translate(${joyState.x*30}px, ${joyState.y*30}px)`;
        });
        window.addEventListener('touchend', () => { joyState.active = false; joyState.x = 0; joyState.y = 0; joyStick.style.transform = 'none'; });
        document.getElementById('atk-btn').ontouchstart = (e) => { e.preventDefault(); if(!player.isAttacking) { player.isAttacking = true; player.swingProgress = 0; player.hitList.clear(); }};
        document.getElementById('dash-btn').ontouchstart = (e) => { e.preventDefault(); if(player.dashCooldown <= 0) { player.dashTimer = 18; player.dashCooldown = 65; player.dashAngle = player.angle; }};

        function update() {
            if(!gameActive) return;
            
            // Player Movement & Dash
            if(player.dashTimer > 0) {
                player.x += Math.cos(player.dashAngle)*20; player.y += Math.sin(player.dashAngle)*20; player.dashTimer--;
                player.afterimages.push({x: player.x, y: player.y});
            } else if(joyState.active && player.stunTimer <= 0) {
                player.x += joyState.x*8; player.y += joyState.y*8; player.angle = Math.atan2(joyState.y, joyState.x);
            }
            if(player.afterimages.length > 6) player.afterimages.shift();
            player.x += player.kx; player.y += player.ky; player.kx *= 0.85; player.ky *= 0.85;
            if(player.stunTimer > 0) player.stunTimer--;
            if(player.dashCooldown > 0) player.dashCooldown--;

            // Bot AI (Stuck Fix)
            bots.forEach(bot => {
                if(bot.stunTimer > 0) {
                    bot.stunTimer--;
                } else {
                    let d = Math.hypot(player.x-bot.x, player.y-bot.y);
                    if(d < 500) {
                        bot.angle = Math.atan2(player.y-bot.y, player.x-bot.x);
                        bot.x += Math.cos(bot.angle)*bot.speed; bot.y += Math.sin(bot.angle)*bot.speed;
                        if(d < 120 && !bot.isAttacking && bot.attackCooldown <= 0) { bot.isAttacking = true; bot.swingProgress = 0; bot.hitList.clear(); }
                    } else {
                        if(bot.wanderTime <= 0) { bot.wanderAngle = Math.random()*Math.PI*2; bot.wanderTime = 80; }
                        bot.x += Math.cos(bot.wanderAngle)*3; bot.y += Math.sin(bot.wanderAngle)*3; bot.wanderTime--;
                    }
                }
                bot.x += bot.kx; bot.y += bot.ky; bot.kx *= 0.85; bot.ky *= 0.85;
                if(bot.attackCooldown > 0) bot.attackCooldown--;
            });

            // Combat System (Fixed Damage texts)
            const all = [player, ...bots];
            all.forEach(a => {
                if(a.isAttacking) {
                    a.swingProgress += (0.15/a.scale);
                    all.forEach(v => {
                        if(a.id !== v.id && !a.hitList.has(v.id)) {
                            if(Math.hypot(a.x-v.x, a.y-v.y) < 135*a.scale) {
                                let dmg = Math.floor(25*a.scale); v.hp -= dmg;
                                v.kx = Math.cos(Math.atan2(v.y-a.y, v.x-a.x))*22; v.ky = Math.sin(Math.atan2(v.y-a.y, v.x-a.x))*22;
                                v.stunTimer = 12; a.hitList.add(v.id); addDamageText(v.x, v.y, dmg);
                                if(v.hp <= 0 && a.isPlayer) { kills++; sessionCoins += 50*v.tier; }
                            }
                        }
                    });
                    if(a.swingProgress >= 1) { a.isAttacking = false; a.attackCooldown = 35; }
                }
            });

            // Damage Text Cleanup Fix
            for(let i=damageTexts.length-1; i>=0; i--) {
                damageTexts[i].y -= 2; damageTexts[i].life -= 0.02;
                if(damageTexts[i].life <= 0) damageTexts.splice(i, 1);
            }

            // Progression
            for(let i=xpGems.length-1; i>=0; i--) {
                if(Math.hypot(player.x-xpGems[i].x, player.y-xpGems[i].y) < 60) { xpGems.splice(i, 1); player.xp += 20; spawnGem(); }
            }
            if(player.xp >= player.nextLevel) { player.tier++; player.xp -= player.nextLevel; player.nextLevel *= 1.6; player.scale += 0.15; player.radius = 30*player.scale; player.maxHp += 40; player.hp = player.maxHp; }
            
            camera.x += (player.x - camera.x)*0.1; camera.y += (player.y - camera.y)*0.1;
            if(player.hp <= 0) { gameActive = false; totalCoins += sessionCoins; localStorage.setItem('sb_coins', totalCoins); gameOverScreen.style.display = 'flex'; }
            bots = bots.filter(b => b.hp > 0);
            while(bots.length < 18) spawnBot();
        }

        function draw() {
            ctx.fillStyle = '#111'; ctx.fillRect(0,0,w,h);
            update();
            ctx.save(); ctx.translate(w/2, h/2); ctx.scale(camera.zoom, camera.zoom); ctx.translate(-camera.x, -camera.y);
            ctx.fillStyle = currentTheme.bg; ctx.fillRect(0,0,WORLD_SIZE, WORLD_SIZE);
            
            xpGems.forEach(g => { ctx.fillStyle = currentTheme.gem; ctx.beginPath(); ctx.arc(g.x, g.y, 6, 0, Math.PI*2); ctx.fill(); });
            
            [player, ...bots].forEach(e => {
                e.afterimages?.forEach((img, i) => { ctx.globalAlpha = i*0.08; ctx.fillStyle = e.color; ctx.beginPath(); ctx.arc(img.x, img.y, e.radius, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1; });
                ctx.save(); ctx.translate(e.x, e.y);
                
                // Enhanced Health Bar
                ctx.fillStyle = '#000'; ctx.fillRect(-32*e.scale, -52*e.scale, 64*e.scale, 12*e.scale);
                ctx.fillStyle = e.isPlayer ? '#00e676' : '#ff1744'; 
                ctx.fillRect(-30*e.scale, -50*e.scale, (60*e.scale)*(e.hp/e.maxHp), 8*e.scale);
                
                let sa = 0.5;
                if(e.isAttacking) sa = 1.05 - (e.swingProgress * 2.1); // Fixed 120 deg
                renderSword(ctx, Math.cos(e.angle+sa)*25, Math.sin(e.angle+sa)*25, e.scale, e.angle+sa, e.swordColor, e.hiltColor);
                
                ctx.fillStyle = e.color; ctx.beginPath(); ctx.arc(0,0,e.radius, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.stroke();
                ctx.restore();
            });

            bushes.forEach(b => { ctx.fillStyle = currentTheme.bush; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); });

            damageTexts.forEach(t => { ctx.globalAlpha = t.life; ctx.fillStyle = '#fff'; ctx.font = 'bold 32px Arial'; ctx.textAlign='center'; ctx.fillText(t.text, t.x, t.y); ctx.globalAlpha = 1; });
            ctx.restore();

            if(gameActive) {
                document.getElementById('score').innerText = `Kills: ${kills}`;
                document.getElementById('ingame-coins').innerText = `Coins: ${sessionCoins}`;
                document.getElementById('xp-display').innerText = `Tier ${player.tier}: ${Math.floor(player.xp)} / ${Math.floor(player.nextLevel)}`;
                
                miniCtx.clearRect(0,0,150,150);
                const s = 150/WORLD_SIZE;
                bots.forEach(b => { miniCtx.fillStyle = 'red'; miniCtx.fillRect(b.x*s, b.y*s, 2, 2); });
                miniCtx.fillStyle = '#00e676'; miniCtx.beginPath(); miniCtx.arc(player.x*s, player.y*s, 3, 0, Math.PI*2); miniCtx.fill();
            }
            requestAnimationFrame(draw);
        }

        window.onresize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
        document.getElementById('openShopBtn').onclick = () => { menu.style.display = 'none'; shopMenu.style.display = 'flex'; updateShopUI(); };
        document.getElementById('closeShopBtn').onclick = () => { shopMenu.style.display = 'none'; menu.style.display = 'flex'; };
        document.getElementById('menuBtn').onclick = () => { location.reload(); };
        document.getElementById('respawnBtn').onclick = () => { gameOverScreen.style.display = 'none'; resetGame(); gameActive = true; };

        function updateShopUI() {
            document.getElementById('menu-coins').innerText = `Coins: ${totalCoins}`;
            document.getElementById('shop-coin-display').innerText = `Coins: ${totalCoins}`;
            const grid = document.getElementById('shop-grid'); grid.innerHTML = '';
            Object.keys(skins).forEach(name => {
                const s = skins[name]; const isOwned = ownedSkins.includes(name); const isSelected = selectedSkinName === name;
                const item = document.createElement('div'); item.className = `shop-item ${isSelected ? 'selected' : ''}`;
                item.innerHTML = `<div style="font-weight:bold;">${name}</div><canvas class="preview-canvas" id="pc-${name}"></canvas><div>${isOwned ? (isSelected ? 'EQUIPPED' : 'OWNED') : s.price}</div>`;
                item.onclick = () => {
                    if(isOwned) { selectedSkinName = name; localStorage.setItem('sb_selected', name); }
                    else if(totalCoins >= s.price) { totalCoins -= s.price; ownedSkins.push(name); selectedSkinName = name; localStorage.setItem('sb_coins', totalCoins); localStorage.setItem('sb_owned', JSON.stringify(ownedSkins)); localStorage.setItem('sb_selected', name); }
                    updateShopUI();
                };
                grid.appendChild(item);
                const pcvs = document.getElementById(`pc-${name}`), pctx = pcvs.getContext('2d');
                pctx.translate(40,40); pctx.fillStyle = s.color; pctx.beginPath(); pctx.arc(0,0,15,0,Math.PI*2); pctx.fill();
            });
        }
        updateShopUI();
        draw();
    </script>
</body>
</html>
