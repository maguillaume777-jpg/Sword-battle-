<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwordsBattle.io | Worlds Edition</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        /* Menu Styling */
        #menu {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: white; text-align: center;
        }
        .menu-box { background: #222; padding: 30px; border-radius: 20px; border: 2px solid #444; width: 300px; }
        input { padding: 12px; border-radius: 8px; border: none; width: 80%; margin: 10px 0; font-size: 16px; }
        select { padding: 12px; border-radius: 8px; width: 88%; margin: 10px 0; background: #333; color: white; border: 1px solid #555; }
        button { padding: 15px 30px; border-radius: 8px; border: none; background: #00e676; color: black; font-weight: bold; cursor: pointer; width: 88%; font-size: 18px; }
        button:hover { background: #00c853; }

        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0,0,0,0.6); padding: 12px; border-radius: 12px; 
            pointer-events: none; border: 2px solid rgba(255,255,255,0.1); z-index: 10; display: none;
        }
        #minimap {
            position: absolute; top: 10px; right: 10px; width: 120px; height: 120px;
            background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.2); border-radius: 8px; z-index: 10; display: none;
        }
        .touch-ctrl {
            position: absolute; border-radius: 50%; background: rgba(255, 255, 255, 0.2); 
            border: 2px solid rgba(255, 255, 255, 0.4); display: none; user-select: none; z-index: 20;
        }
        #joystick-base { bottom: 40px; left: 40px; width: 100px; height: 100px; }
        #joystick-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.6); border-radius: 50%; }
        #dash-btn { bottom: 130px; right: 40px; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        #atk-btn { bottom: 40px; right: 40px; width: 90px; height: 90px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; background: rgba(255, 0, 0, 0.3); }
    </style>
</head>
<body>

    <div id="menu">
        <div class="menu-box">
            <h1>SWORDS BATTLE</h1>
            <input type="text" id="username" placeholder="Enter Name..." maxlength="12">
            <select id="worldSelect">
                <option value="grass">Grassy Plains</option>
                <option value="lava">Volcanic Ember</option>
                <option value="ocean">Deep Ocean</option>
            </select>
            <button id="startBtn">JOIN GAME</button>
        </div>
    </div>

    <div id="ui">
        <h2 id="ui-name" style="margin:0; font-size: 18px; color: #a5d6a7;">Player</h2>
        <div id="score">Kills: 0</div>
    </div>

    <canvas id="minimap"></canvas>
    <div id="joystick-base" class="touch-ctrl"><div id="joystick-stick"></div></div>
    <div id="dash-btn" class="touch-ctrl">DASH</div>
    <div id="atk-btn" class="touch-ctrl">SWING</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const mCanvas = document.getElementById('minimap');
        const mCtx = mCanvas.getContext('2d');
        
        // UI Elements
        const menu = document.getElementById('menu');
        const startBtn = document.getElementById('startBtn');
        const uiLayer = document.getElementById('ui');
        const scoreElement = document.getElementById('score');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false;
        let kills = 0;
        const keys = {};
        const mouse = { x: 0, y: 0 };
        let isTouch = false;
        const joyState = { x: 0, y: 0, active: false };

        const WORLD_SIZE = 3000; 
        const BOT_COUNT = 15;
        const camera = { x: 0, y: 0 };
        const bushes = [];

        // World Themes
        const themes = {
            grass: { bg: '#4caf50', alt: '#43a047', bush: 'rgba(13, 71, 16, 0.7)' },
            lava: { bg: '#bf360c', alt: '#d84315', bush: 'rgba(62, 39, 35, 0.8)' },
            ocean: { bg: '#0277bd', alt: '#0288d1', bush: 'rgba(0, 96, 100, 0.6)' }
        };
        let currentTheme = themes.grass;

        function createEntity(x, y, color, isPlayer = false, name = "Bot") {
            return {
                x: x || Math.random() * WORLD_SIZE,
                y: y || Math.random() * WORLD_SIZE,
                radius: 24, color: color, name: name,
                hp: 100, maxHp: 100, speed: isPlayer ? 5 : 2.5,
                angle: 0, isPlayer: isPlayer,
                isAttacking: false, swingAngle: 0,
                dashTimer: 0, dashCooldown: 0,
                vx: 0, vy: 0, isHidden: false
            };
        }

        let player = createEntity(WORLD_SIZE/2, WORLD_SIZE/2, '#2196f3', true);
        let bots = [];

        startBtn.onclick = () => {
            const nameInput = document.getElementById('username').value;
            player.name = nameInput || "Player";
            document.getElementById('ui-name').innerText = player.name;
            currentTheme = themes[document.getElementById('worldSelect').value];
            
            // Initialize World
            bushes.length = 0;
            for(let i=0; i<25; i++) bushes.push({ x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE, size: 100 });
            
            bots = [];
            const colors = ['#f44336', '#ff9800', '#9c27b0', '#e91e63'];
            for (let i = 0; i < BOT_COUNT; i++) bots.push(createEntity(null, null, colors[i%4]));

            menu.style.display = 'none';
            uiLayer.style.display = 'block';
            mCanvas.style.display = 'block';
            gameActive = true;
        };

        // --- Controls ---
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;
        window.onmousedown = () => { if(gameActive && !isTouch) triggerAttack(player); };
        window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
        
        window.addEventListener('touchstart', () => { 
            if(!gameActive) return;
            isTouch = true; 
            document.querySelectorAll('.touch-ctrl').forEach(el => el.style.display = 'flex'); 
        }, {once: true});

        function triggerAttack(e) { if (!e.isAttacking) { e.isAttacking = true; e.swingAngle = -1.2; } }
        function triggerDash(e) { if (e.dashCooldown <= 0) { e.dashTimer = 12; e.dashCooldown = 60; } }

        // --- Logic ---
        function update() {
            if(!gameActive) return;

            let pSpeed = player.dashTimer > 0 ? 15 : player.speed;
            if (player.dashTimer > 0) player.dashTimer--;
            if (player.dashCooldown > 0) player.dashCooldown--;

            // Move Player
            let mx = 0, my = 0;
            if (isTouch && joyState.active) {
                mx = joyState.x * pSpeed; my = joyState.y * pSpeed;
                player.angle = Math.atan2(joyState.y, joyState.x);
            } else if (!isTouch) {
                if (keys['KeyW']) my = -pSpeed; if (keys['KeyS']) my = pSpeed;
                if (keys['KeyA']) mx = -pSpeed; if (keys['KeyD']) mx = pSpeed;
                player.angle = Math.atan2((mouse.y + camera.y) - player.y, (mouse.x + camera.x) - player.x);
            }
            player.x += mx + player.vx; player.y += my + player.vy;
            player.vx *= 0.8; player.vy *= 0.8;

            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;

            // Check Bush Stealth
            [player, ...bots].forEach(e => {
                e.isHidden = false;
                for(let b of bushes) {
                    if (Math.hypot(e.x - b.x, e.y - b.y) < b.size/2) { e.isHidden = true; break; }
                }
            });

            bots.forEach((bot, i) => {
                const dist = Math.hypot(player.x - bot.x, player.y - bot.y);
                if (dist < 300 && !player.isHidden) {
                    bot.angle = Math.atan2(player.y - bot.y, player.x - bot.x);
                    if (dist < 80 && Math.random() < 0.05) triggerAttack(bot);
                } else if (Math.random() < 0.01) {
                    bot.angle = Math.random() * Math.PI * 2;
                }
                bot.x += Math.cos(bot.angle) * bot.speed + bot.vx;
                bot.y += Math.sin(bot.angle) * bot.speed + bot.vy;
                bot.vx *= 0.8; bot.vy *= 0.8;

                checkCombat(player, bot); checkCombat(bot, player);

                if (bot.hp <= 0) {
                    bots[i] = createEntity(null, null, bot.color);
                    kills++; scoreElement.innerText = `Kills: ${kills}`;
                }
            });

            if (player.hp <= 0) location.reload(); // Simple death reset
        }

        function checkCombat(attacker, target) {
            if (!attacker.isAttacking) return;
            const sAngle = attacker.angle + attacker.swingAngle;
            const sx = attacker.x + Math.cos(sAngle) * 55, sy = attacker.y + Math.sin(sAngle) * 55;
            if (Math.hypot(sx - target.x, sy - target.y) < target.radius + 15) {
                target.hp -= 2;
                const kDir = Math.atan2(target.y - attacker.y, target.x - attacker.x);
                target.vx += Math.cos(kDir) * 10; target.vy += Math.sin(kDir) * 10;
            }
        }

        function draw() {
            ctx.fillStyle = '#111'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            if(!gameActive) { requestAnimationFrame(draw); return; }

            ctx.save(); ctx.translate(-camera.x, -camera.y);
            
            // Draw Background
            ctx.fillStyle = currentTheme.bg; ctx.fillRect(0,0, WORLD_SIZE, WORLD_SIZE);
            ctx.fillStyle = currentTheme.alt;
            for(let x=0; x<WORLD_SIZE; x+=160) for(let y=0; y<WORLD_SIZE; y+=160) ctx.fillRect(x,y,80,160);

            // Draw Bots and Player (Layering fix: Entities first)
            bots.forEach(drawEntity);
            drawEntity(player);

            // Draw Bushes (Top layer so they cover players)
            ctx.fillStyle = currentTheme.bush;
            bushes.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, b.size/2, 0, Math.PI*2); ctx.fill();
            });

            ctx.restore();
            update();
            drawMinimap();
            requestAnimationFrame(draw);
        }

        function drawEntity(e) {
            ctx.save();
            ctx.translate(e.x - camera.x, e.y - camera.y);
            ctx.globalAlpha = e.isHidden ? 0.4 : 1.0;

            // HP Bar
            ctx.fillStyle = '#333'; ctx.fillRect(-20, -40, 40, 5);
            ctx.fillStyle = e.isPlayer ? '#00e676' : '#ff5252';
            ctx.fillRect(-20, -40, 40 * (e.hp/e.maxHp), 5);

            // Name
            ctx.fillStyle = 'white'; ctx.font = '12px Arial'; ctx.textAlign = 'center';
            ctx.fillText(e.name, 0, -45);

            ctx.rotate(e.isPlayer && !isTouch ? Math.atan2((mouse.y + camera.y) - e.y, (mouse.x + camera.x) - e.x) : e.angle);

            // Sword
            ctx.save();
            if (e.isAttacking) { ctx.rotate(e.swingAngle); e.swingAngle += 0.25; if (e.swingAngle > 1.2) e.isAttacking = false; }
            ctx.fillStyle = '#eee'; ctx.fillRect(20, -4, 45, 8); 
            ctx.restore();

            // Body
            ctx.beginPath(); ctx.arc(0, 0, e.radius, 0, Math.PI * 2);
            ctx.fillStyle = e.color; ctx.fill(); ctx.stroke();
            ctx.restore();
            ctx.globalAlpha = 1.0;
        }

        function drawMinimap() {
            mCtx.clearRect(0,0,120,120);
            const s = 120/WORLD_SIZE;
            mCtx.fillStyle = '#00e5ff'; mCtx.fillRect(player.x*s, player.y*s, 4, 4);
            mCtx.fillStyle = 'red'; bots.forEach(b => mCtx.fillRect(b.x*s, b.y*s, 2, 2));
        }

        // Mobile Logic
        const joyBase = document.getElementById('joystick-base');
        joyBase.ontouchstart = () => joyState.active = true;
        window.ontouchmove = e => {
            if (!joyState.active) return;
            const t = e.touches[0]; const r = joyBase.getBoundingClientRect();
            const dx = t.clientX - (r.left + r.width/2), dy = t.clientY - (r.top + r.height/2);
            const d = Math.min(50, Math.hypot(dx,dy)); const a = Math.atan2(dy,dx);
            joyState.x = Math.cos(a)*d/50; joyState.y = Math.sin(a)*d/50;
            joyStick.style.transform = `translate(${joyState.x*50}px,${joyState.y*50}px)`;
        };
        window.ontouchend = () => { joyState.active = false; joyState.x = 0; joyState.y = 0; joyStick.style.transform = 'none'; };
        document.getElementById('dash-btn').ontouchstart = e => { e.preventDefault(); triggerDash(player); };
        document.getElementById('atk-btn').ontouchstart = e => { e.preventDefault(); triggerAttack(player); };

        draw();
    </script>
</body>
</html>
