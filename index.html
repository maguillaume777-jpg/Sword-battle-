<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwordsBattle.io | Advanced Combat</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #menu {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; color: white;
        }
        .menu-box { background: #222; padding: 30px; border-radius: 20px; border: 2px solid #444; width: 280px; text-align: center; }
        button { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; background: #00e676; font-weight: bold; cursor: pointer; color: #000; }

        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 12px; 
            pointer-events: none; z-index: 1000; display: none;
        }

        #right-ui {
            position: absolute; top: 10px; right: 10px; 
            display: flex; flex-direction: column; gap: 10px;
            z-index: 1000; display: none;
        }

        #minimap-container {
            width: 160px; height: 160px; 
            background: rgba(0,0,0,0.6); border: 3px solid #444;
            border-radius: 8px; overflow: hidden;
        }
        #minimap { width: 100%; height: 100%; }

        #leaderboard {
            width: 160px; background: rgba(0,0,0,0.7); border: 2px solid #444;
            border-radius: 8px; padding: 8px; color: white; font-size: 12px;
        }
        .lb-entry { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .lb-me { color: #00e676; font-weight: bold; }

        .touch-ctrl {
            position: absolute; border-radius: 50%; background: rgba(255, 255, 255, 0.15); 
            border: 2px solid rgba(255, 255, 255, 0.3); display: none; z-index: 1500;
        }
        #joystick-base { bottom: 60px; left: 60px; width: 120px; height: 120px; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; opacity: 0.6; pointer-events: none; }
        #dash-btn { bottom: 180px; right: 60px; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        #atk-btn { bottom: 50px; right: 50px; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; background: rgba(255, 0, 0, 0.4); }
    </style>
</head>
<body>

    <div id="menu">
        <div class="menu-box">
            <h1 style="color:#00e676">SWORDS BATTLE</h1>
            <input type="text" id="username" placeholder="Name..." style="width:85%; padding:10px; margin-bottom:10px;">
            <select id="worldSelect" style="width:90%; padding:10px; margin-bottom:10px;">
                <option value="grass">Grassy Plains</option>
                <option value="lava">Volcanic Ember</option>
                <option value="ocean">Deep Ocean</option>
            </select>
            <button id="startBtn">START GAME</button>
        </div>
    </div>

    <div id="ui">
        <h2 id="ui-name" style="margin:0; font-size: 16px;">Player</h2>
        <div id="xp-display">XP: 0 / 100</div>
        <div id="score">Kills: 0</div>
    </div>

    <div id="right-ui">
        <div id="minimap-container">
            <canvas id="minimap" width="160" height="160"></canvas>
        </div>
        <div id="leaderboard">
            <div style="text-align:center; border-bottom:1px solid #555; margin-bottom:5px; padding-bottom:2px;">RANKING (XP)</div>
            <div id="lb-list"></div>
        </div>
    </div>

    <div id="joystick-base" class="touch-ctrl"><div id="joystick-stick"></div></div>
    <div id="dash-btn" class="touch-ctrl">DASH</div>
    <div id="atk-btn" class="touch-ctrl">SWING</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const miniCanvas = document.getElementById('minimap');
        const miniCtx = miniCanvas.getContext('2d');
        
        const menu = document.getElementById('menu');
        const uiLayer = document.getElementById('ui');
        const rightUI = document.getElementById('right-ui');
        const lbList = document.getElementById('lb-list');
        const joyBase = document.getElementById('joystick-base');
        const joyStick = document.getElementById('joystick-stick');

        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;

        let gameActive = false;
        let kills = 0;
        const joyState = { x: 0, y: 0, active: false, id: null };

        const WORLD_SIZE = 6000; 
        const camera = { x: 0, y: 0, zoom: 1 };
        const bushes = [];
        let bots = [];
        let xpGems = [];
        let damageTexts = [];

        const themes = {
            grass: { bg: '#2e7d32', alt: '#388e3c', bush: 'rgba(34, 139, 34, 0.7)', gem: '#ffd700' },
            lava: { bg: '#bf360c', alt: '#d84315', bush: 'rgba(74, 34, 20, 0.7)', gem: '#ffab00' },
            ocean: { bg: '#01579b', alt: '#0277bd', bush: 'rgba(0, 70, 90, 0.6)', gem: '#00e5ff' }
        };
        let currentTheme = themes.grass;

        const player = {
            id: 'player', x: WORLD_SIZE/2, y: WORLD_SIZE/2,
            radius: 30, hp: 100, maxHp: 100, color: '#2196f3', name: "Player",
            speed: 8, angle: 0, isAttacking: false, swingProgress: 0, hitList: new Set(),
            dashTimer: 0, dashCooldown: 0, kx: 0, ky: 0, xp: 0, totalXp: 0, nextLevel: 100, 
            tier: 1, scale: 1, isPlayer: true, kills: 0
        };

        document.getElementById('startBtn').onclick = () => {
            player.name = document.getElementById('username').value || "Player";
            document.getElementById('ui-name').innerText = player.name;
            currentTheme = themes[document.getElementById('worldSelect').value];
            
            // Bush Generation - Multi-circle organic shapes
            for(let i=0; i<50; i++) {
                let bx = Math.random()*WORLD_SIZE;
                let by = Math.random()*WORLD_SIZE;
                let parts = [];
                let numParts = 3 + Math.floor(Math.random()*4);
                for(let p=0; p<numParts; p++) {
                    parts.push({
                        ox: (Math.random()-0.5)*80,
                        oy: (Math.random()-0.5)*80,
                        r: 40 + Math.random()*50
                    });
                }
                bushes.push({ x: bx, y: by, parts: parts });
            }

            for(let i=0; i<35; i++) spawnBot();
            for(let i=0; i<150; i++) spawnGem();
            menu.style.display = 'none';
            uiLayer.style.display = 'block';
            rightUI.style.display = 'flex';
            document.querySelectorAll('.touch-ctrl').forEach(el => el.style.display = 'flex');
            gameActive = true;
        };

        function spawnBot() {
            const tier = Math.floor(Math.random() * 2) + 1;
            const names = ["Shadow", "Titan", "Rogue", "Slayer", "Blade", "Rex", "Wolf", "Ghost", "Zenith", "Void"];
            bots.push({
                id: Math.random().toString(36).substr(2, 9),
                x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE,
                radius: 30 * (1 + (tier-1)*0.3), hp: 100 * tier, maxHp: 100 * tier, color: '#f44336',
                name: names[Math.floor(Math.random()*names.length)], 
                speed: 4.5 + Math.random()*1.5, angle: Math.random()*Math.PI*2,
                isAttacking: false, swingProgress: 0, hitList: new Set(), kx: 0, ky: 0, 
                tier: tier, scale: 1 + (tier-1)*0.3, isPlayer: false, kills: 0, xp: 0, totalXp: (tier-1)*100, nextLevel: 100
            });
        }

        function spawnGem(x, y, value) {
            xpGems.push({ x: x || Math.random()*WORLD_SIZE, y: y || Math.random()*WORLD_SIZE, val: value || 10 + Math.random()*20, size: 5 + Math.random()*5 });
        }

        function addDamageText(x, y, text, color) {
            damageTexts.push({ x, y, text, color, life: 1.0, vx: (Math.random()-0.5)*2, vy: -2 });
        }

        // TOUCH CONTROLS
        joyBase.addEventListener('touchstart', (e) => { joyState.active = true; joyState.id = e.targetTouches[0].identifier; e.preventDefault(); }, {passive: false});
        window.addEventListener('touchmove', (e) => {
            if (!joyState.active) return;
            let touch = Array.from(e.changedTouches).find(t => t.identifier === joyState.id);
            if(!touch) return;
            const rect = joyBase.getBoundingClientRect();
            const dx = touch.clientX - (rect.left + rect.width/2);
            const dy = touch.clientY - (rect.top + rect.height/2);
            const dist = Math.min(60, Math.hypot(dx, dy));
            const angle = Math.atan2(dy, dx);
            joyState.x = (Math.cos(angle) * dist) / 60;
            joyState.y = (Math.sin(angle) * dist) / 60;
            joyStick.style.transform = `translate(${joyState.x * 50}px, ${joyState.y * 50}px)`;
            e.preventDefault();
        }, {passive: false});
        window.addEventListener('touchend', (e) => { 
            let touch = Array.from(e.changedTouches).find(t => t.identifier === joyState.id);
            if(touch) { joyState.active = false; joyState.x = 0; joyState.y = 0; joyStick.style.transform = 'none'; }
        });

        document.getElementById('atk-btn').addEventListener('touchstart', (e) => { 
            e.preventDefault();
            if(!player.isAttacking) { player.isAttacking = true; player.swingProgress = 0; player.hitList.clear(); } 
        }, {passive: false});

        document.getElementById('dash-btn').addEventListener('touchstart', (e) => { 
            e.preventDefault();
            if(player.dashCooldown <= 0) { player.dashTimer = 15; player.dashCooldown = 60; } 
        }, {passive: false});

        function resolveCollision(a, b) {
            const dx = b.x - a.x; const dy = b.y - a.y;
            const dist = Math.hypot(dx, dy);
            const minDist = a.radius + b.radius;
            if (dist < minDist && dist > 0) {
                const overlap = (minDist - dist) / 2;
                const ax = (dx / dist) * overlap; const ay = (dy / dist) * overlap;
                a.x -= ax; a.y -= ay; b.x += ax; b.y += ay;
            }
        }

        function drawEntity(e) {
            ctx.save();
            ctx.translate(e.x, e.y);
            
            // Bar
            ctx.fillStyle = '#111'; ctx.fillRect(-30 * e.scale, -50 * e.scale, 60 * e.scale, 8);
            ctx.fillStyle = e.isPlayer ? '#00e676' : '#ff1744';
            ctx.fillRect(-30 * e.scale, -50 * e.scale, (60 * e.scale) * (e.hp/e.maxHp), 8);
            
            ctx.rotate(e.angle);
            
            // Sword
            ctx.save();
            let swingOffset = 0; 
            if (e.isAttacking) {
                swingOffset = -1.2 + (e.swingProgress * 2.4);
                e.swingProgress += (0.12 / e.scale); 
                if(e.swingProgress >= 1) { e.isAttacking = false; e.swingProgress = 0; e.hitList.clear(); }
            }
            ctx.rotate(swingOffset);
            
            const swordLen = 75 * e.scale;
            ctx.fillStyle = '#5d4037'; ctx.fillRect(e.radius * 0.5, -3 * e.scale, 15 * e.scale, 6 * e.scale);
            ctx.fillStyle = '#ffd700'; ctx.fillRect(e.radius * 0.5 + 15 * e.scale, -8 * e.scale, 5 * e.scale, 16 * e.scale);
            ctx.fillStyle = '#eee';
            ctx.beginPath();
            ctx.moveTo(e.radius * 0.5 + 20 * e.scale, -5 * e.scale);
            ctx.lineTo(e.radius * 0.5 + swordLen, -1 * e.scale);
            ctx.lineTo(e.radius * 0.5 + swordLen, 1 * e.scale);
            ctx.lineTo(e.radius * 0.5 + 20 * e.scale, 5 * e.scale);
            ctx.fill();
            ctx.restore();
            
            // Body
            ctx.beginPath(); ctx.arc(0, 0, e.radius, 0, Math.PI * 2);
            ctx.fillStyle = e.color; ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.stroke();
            ctx.restore();
        }

        function update() {
            if(!gameActive) return;
            camera.zoom = 1 / (1 + (player.tier - 1) * 0.15);
            let moveSpeed = (player.speed - (player.tier * 0.1)) + (player.dashTimer > 0 ? 12 : 0);
            if (player.dashTimer > 0) player.dashTimer--;
            if (player.dashCooldown > 0) player.dashCooldown--;

            if (joyState.active) {
                player.x += joyState.x * moveSpeed;
                player.y += joyState.y * moveSpeed;
                player.angle = Math.atan2(joyState.y, joyState.x);
            }
            player.x += player.kx; player.y += player.ky;
            player.kx *= 0.85; player.ky *= 0.85;
            player.x = Math.max(player.radius, Math.min(WORLD_SIZE - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(WORLD_SIZE - player.radius, player.y));

            const allEntities = [player, ...bots];

            // Gems & XP Logic for everyone
            allEntities.forEach(ent => {
                for (let i = xpGems.length - 1; i >= 0; i--) {
                    const gem = xpGems[i];
                    if (Math.hypot(ent.x - gem.x, ent.y - gem.y) < ent.radius + 15) {
                        ent.xp += gem.val;
                        ent.totalXp += gem.val;
                        xpGems.splice(i, 1);
                        if (xpGems.length < 120) spawnGem();
                    }
                }
                if (ent.xp >= ent.nextLevel) {
                    ent.tier++; ent.xp -= ent.nextLevel; ent.nextLevel = Math.floor(ent.nextLevel * 1.5);
                    ent.scale += 0.15; ent.radius = 30 * ent.scale; ent.maxHp += 40; ent.hp = ent.maxHp;
                }
            });

            bots.forEach((bot, index) => {
                let nearest = null; let minDist = 800;
                allEntities.forEach(ent => {
                    if (ent === bot) return;
                    const d = Math.hypot(ent.x - bot.x, ent.y - bot.y);
                    if (d < minDist) { minDist = d; nearest = ent; }
                });

                if (nearest) {
                    bot.angle = Math.atan2(nearest.y - bot.y, nearest.x - bot.x);
                    bot.x += Math.cos(bot.angle) * bot.speed;
                    bot.y += Math.sin(bot.angle) * bot.speed;
                    if (minDist < 140 * bot.scale && !bot.isAttacking && Math.random() < 0.05) {
                        bot.isAttacking = true; bot.swingProgress = 0; bot.hitList.clear();
                    }
                }
                bot.x += bot.kx; bot.y += bot.ky;
                bot.kx *= 0.85; bot.ky *= 0.85;
                bot.x = Math.max(bot.radius, Math.min(WORLD_SIZE - bot.radius, bot.x));
                bot.y = Math.max(bot.radius, Math.min(WORLD_SIZE - bot.radius, bot.y));

                // Combat logic
                allEntities.forEach(attacker => {
                    if (attacker === bot || !attacker.isAttacking || attacker.hitList.has(bot.id)) return;
                    const range = 150 * attacker.scale;
                    if (Math.hypot(attacker.x - bot.x, attacker.y - bot.y) < range) {
                        let dmg = Math.floor(20 * attacker.scale);
                        bot.hp -= dmg;
                        attacker.hitList.add(bot.id);
                        const ang = Math.atan2(bot.y - attacker.y, bot.x - attacker.x);
                        bot.kx = Math.cos(ang) * 18; bot.ky = Math.sin(ang) * 18;
                        
                        // Damage text color logic
                        let color = attacker.isPlayer ? "#ffeb3b" : "#ff5252";
                        addDamageText(bot.x, bot.y, dmg, color);
                        
                        if (bot.hp <= 0) {
                            attacker.kills++;
                            attacker.xp += 100 * bot.tier;
                            attacker.totalXp += 100 * bot.tier;
                            if (attacker.isPlayer) kills++;
                        }
                    }
                });

                // Bot hitting player
                if (bot.isAttacking && !bot.hitList.has('player') && Math.hypot(bot.x - player.x, bot.y - player.y) < 130 * bot.scale) {
                    let dmg = Math.floor(10 * bot.scale);
                    player.hp -= dmg;
                    bot.hitList.add('player');
                    addDamageText(player.x, player.y, dmg, "#ff1744"); // Red for player taking damage
                    const ang = Math.atan2(player.y - bot.y, player.x - bot.x);
                    player.kx = Math.cos(ang) * 12; player.ky = Math.sin(ang) * 12;
                }

                allEntities.forEach(other => { if(bot !== other) resolveCollision(bot, other); });
                if (bot.hp <= 0) { for(let i=0; i<8; i++) spawnGem(bot.x, bot.y, 30); bots.splice(index, 1); spawnBot(); }
            });

            // Damage Text Update
            for (let i = damageTexts.length - 1; i >= 0; i--) {
                let d = damageTexts[i];
                d.x += d.vx; d.y += d.vy; d.life -= 0.02;
                if (d.life <= 0) damageTexts.splice(i, 1);
            }

            camera.x = player.x; camera.y = player.y;
            
            // Leaderboard Update (XP based)
            const all = [player, ...bots].sort((a, b) => b.totalXp - a.totalXp).slice(0, 5);
            lbList.innerHTML = all.map((ent, i) => `
                <div class="lb-entry ${ent.isPlayer ? 'lb-me' : ''}">
                    <span>${i+1}. ${ent.name}</span>
                    <span>${Math.floor(ent.totalXp)}</span>
                </div>
            `).join('');
        }

        function draw() {
            ctx.fillStyle = '#111'; ctx.fillRect(0, 0, w, h);
            if(!gameActive) { requestAnimationFrame(draw); return; }
            update();
            ctx.save();
            ctx.translate(w / 2, h / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);
            
            ctx.fillStyle = currentTheme.bg; ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            for(let x=0; x<WORLD_SIZE; x+=200) {
                ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x, WORLD_SIZE); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,x); ctx.lineTo(WORLD_SIZE, x); ctx.stroke();
            }

            ctx.fillStyle = currentTheme.gem;
            xpGems.forEach(g => { ctx.beginPath(); ctx.arc(g.x, g.y, g.size, 0, Math.PI*2); ctx.fill(); });
            
            bots.forEach(drawEntity);
            drawEntity(player);
            
            // Organic Bushes
            ctx.fillStyle = currentTheme.bush;
            bushes.forEach(b => {
                b.parts.forEach(p => {
                    ctx.beginPath(); ctx.arc(b.x + p.ox, b.y + p.oy, p.r, 0, Math.PI*2); ctx.fill();
                });
            });

            // Damage Counters
            damageTexts.forEach(d => {
                ctx.save();
                ctx.globalAlpha = d.life;
                ctx.fillStyle = d.color;
                ctx.font = `bold ${18 + (1-d.life)*10}px Arial`;
                ctx.textAlign = "center";
                ctx.fillText(d.text, d.x, d.y);
                ctx.restore();
            });
            
            ctx.strokeStyle = '#ff1744'; ctx.lineWidth = 15; ctx.strokeRect(0,0, WORLD_SIZE, WORLD_SIZE);
            ctx.restore();

            miniCtx.fillStyle = '#000'; miniCtx.fillRect(0,0,160,160);
            const s = 160 / WORLD_SIZE;
            miniCtx.fillStyle = 'red'; bots.forEach(b => miniCtx.fillRect(b.x*s, b.y*s, 2, 2));
            miniCtx.fillStyle = '#00e676'; miniCtx.fillRect(player.x*s - 2, player.y*s - 2, 4, 4);

            document.getElementById('xp-display').innerText = `XP: ${Math.floor(player.xp)} / ${player.nextLevel} (Tier ${player.tier})`;
            document.getElementById('score').innerText = "Total Kills: " + kills;
            requestAnimationFrame(draw);
        }

        window.onresize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
        draw();
    </script>
</body>
</html>
