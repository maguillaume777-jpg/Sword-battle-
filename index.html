<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwordsBattle.io | Motion Fix</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #menu {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; color: white;
        }
        .menu-box { background: #222; padding: 30px; border-radius: 20px; border: 2px solid #444; width: 280px; text-align: center; }
        input, select, button { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        button { background: #00e676; font-weight: bold; cursor: pointer; color: #000; }

        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0,0,0,0.7); padding: 12px; border-radius: 12px; 
            pointer-events: none; z-index: 100; display: none;
        }
        #minimap {
            position: absolute; top: 10px; right: 10px; width: 120px; height: 120px;
            background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.2); border-radius: 8px; z-index: 100; display: none;
        }

        /* Improved Joystick Styles */
        .touch-ctrl {
            position: absolute; border-radius: 50%; background: rgba(255, 255, 255, 0.1); 
            border: 2px solid rgba(255, 255, 255, 0.2); display: none; z-index: 500;
        }
        #joystick-base { bottom: 60px; left: 60px; width: 120px; height: 120px; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; opacity: 0.5; pointer-events: none; }
        
        #dash-btn { bottom: 180px; right: 60px; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid #fff; }
        #atk-btn { bottom: 50px; right: 50px; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; background: rgba(255, 0, 0, 0.3); border: 2px solid rgba(255,0,0,0.5); border-radius: 50%; }
    </style>
</head>
<body>

    <div id="menu">
        <div class="menu-box">
            <h1 style="color:#00e676">SWORDS BATTLE</h1>
            <input type="text" id="username" placeholder="Your Name..." maxlength="10">
            <select id="worldSelect">
                <option value="grass">Grassy Plains</option>
                <option value="lava">Volcanic Ember</option>
                <option value="ocean">Deep Ocean</option>
            </select>
            <button id="startBtn">START GAME</button>
        </div>
    </div>

    <div id="ui">
        <h2 id="ui-name" style="margin:0; font-size: 16px; color:#a5d6a7;">Player</h2>
        <div id="score">Kills: 0</div>
    </div>

    <canvas id="minimap"></canvas>
    
    <div id="joystick-base" class="touch-ctrl"><div id="joystick-stick"></div></div>
    <div id="dash-btn" class="touch-ctrl">DASH</div>
    <div id="atk-btn" class="touch-ctrl">SWING</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const mCanvas = document.getElementById('minimap');
        const mCtx = mCanvas.getContext('2d');
        
        const menu = document.getElementById('menu');
        const uiLayer = document.getElementById('ui');
        const joyBase = document.getElementById('joystick-base');
        const joyStick = document.getElementById('joystick-stick');

        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;

        let gameActive = false;
        let kills = 0;
        let isTouch = false;
        const keys = {};
        const mouse = { x: 0, y: 0 };
        
        // Accurate Joystick State
        const joyState = { x: 0, y: 0, active: false, identifier: null };

        const WORLD_SIZE = 3500;
        const camera = { x: 0, y: 0 };
        const bushes = [];
        let bots = [];

        const themes = {
            grass: { bg: '#2e7d32', alt: '#388e3c', bush: 'rgba(13, 71, 16, 0.6)' },
            lava: { bg: '#bf360c', alt: '#d84315', bush: 'rgba(46, 26, 20, 0.7)' },
            ocean: { bg: '#01579b', alt: '#0277bd', bush: 'rgba(0, 40, 50, 0.5)' }
        };
        let currentTheme = themes.grass;

        const player = {
            x: WORLD_SIZE/2, y: WORLD_SIZE/2,
            radius: 25, hp: 100, maxHp: 100,
            color: '#2196f3', name: "Player",
            speed: 6, angle: 0,
            isAttacking: false, swingAngle: 0,
            dashTimer: 0, dashCooldown: 0,
            vx: 0, vy: 0, isHidden: false
        };

        document.getElementById('startBtn').onclick = () => {
            player.name = document.getElementById('username').value || "Player";
            document.getElementById('ui-name').innerText = player.name;
            currentTheme = themes[document.getElementById('worldSelect').value];
            
            bushes.length = 0;
            for(let i=0; i<30; i++) bushes.push({ x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE, size: 150 });
            
            bots = [];
            const colors = ['#f44336', '#ff9800', '#9c27b0', '#ffeb3b'];
            for(let i=0; i<15; i++) {
                bots.push({
                    x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE,
                    radius: 25, hp: 100, maxHp: 100, color: colors[i%4],
                    name: "Bot " + (i+1), speed: 3, angle: Math.random()*Math.PI*2,
                    isAttacking: false, swingAngle: 0, vx: 0, vy: 0, isHidden: false
                });
            }

            menu.style.display = 'none';
            uiLayer.style.display = 'block';
            mCanvas.style.display = 'block';
            gameActive = true;
        };

        // --- INPUT HANDLERS ---
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;
        window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
        window.onmousedown = () => { if(gameActive && !isTouch) triggerAttack(player); };

        // Joystick Event Logic
        joyBase.addEventListener('touchstart', (e) => {
            isTouch = true;
            joyState.active = true;
            joyState.identifier = e.targetTouches[0].identifier;
            document.querySelectorAll('.touch-ctrl').forEach(el => el.style.display = 'flex');
        }, {passive: false});

        window.addEventListener('touchmove', (e) => {
            if (!joyState.active) return;
            let touch = null;
            for(let t of e.changedTouches) {
                if(t.identifier === joyState.identifier) { touch = t; break; }
            }
            if(!touch) return;

            const rect = joyBase.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const dx = touch.clientX - centerX;
            const dy = touch.clientY - centerY;
            const distance = Math.min(50, Math.hypot(dx, dy));
            const angle = Math.atan2(dy, dx);

            joyState.x = (Math.cos(angle) * distance) / 50;
            joyState.y = (Math.sin(angle) * distance) / 50;
            
            joyStick.style.transform = `translate(${joyState.x * 50}px, ${joyState.y * 50}px)`;
            e.preventDefault();
        }, {passive: false});

        window.addEventListener('touchend', (e) => {
            for(let t of e.changedTouches) {
                if(t.identifier === joyState.identifier) {
                    joyState.active = false;
                    joyState.x = 0; joyState.y = 0;
                    joyStick.style.transform = 'none';
                }
            }
        });

        document.getElementById('atk-btn').ontouchstart = (e) => { e.preventDefault(); triggerAttack(player); };
        document.getElementById('dash-btn').ontouchstart = (e) => { e.preventDefault(); triggerDash(player); };

        function triggerAttack(e) { if (!e.isAttacking) { e.isAttacking = true; e.swingAngle = -1.2; } }
        function triggerDash(e) { if (e.dashCooldown <= 0) { e.dashTimer = 15; e.dashCooldown = 60; } }

        // --- GAME LOGIC ---
        function update() {
            if(!gameActive) return;

            // 1. Movement Calculations
            let speedMod = player.dashTimer > 0 ? 15 : player.speed;
            if (player.dashTimer > 0) player.dashTimer--;
            if (player.dashCooldown > 0) player.dashCooldown--;

            if (isTouch) {
                // Moving via Joystick
                player.x += joyState.x * speedMod + player.vx;
                player.y += joyState.y * speedMod + player.vy;
                if(joyState.x !== 0 || joyState.y !== 0) {
                    player.angle = Math.atan2(joyState.y, joyState.x);
                }
            } else {
                // Moving via Keyboard
                let moveX = 0, moveY = 0;
                if (keys['KeyW']) moveY = -speedMod; if (keys['KeyS']) moveY = speedMod;
                if (keys['KeyA']) moveX = -speedMod; if (keys['KeyD']) moveX = speedMod;
                player.x += moveX + player.vx;
                player.y += moveY + player.vy;
                player.angle = Math.atan2((mouse.y + camera.y) - player.y, (mouse.x + camera.x) - player.x);
            }

            // Knockback friction
            player.vx *= 0.85; player.vy *= 0.85;

            // World Clamp
            player.x = Math.max(player.radius, Math.min(WORLD_SIZE - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(WORLD_SIZE - player.radius, player.y));

            // 2. CAMERA FOLLOW (Smoothly interpolate to player)
            camera.x = player.x - w / 2;
            camera.y = player.y - h / 2;

            // 3. Stealth Check
            player.isHidden = false;
            for(let b of bushes) if(Math.hypot(player.x - b.x, player.y - b.y) < b.size/2) player.isHidden = true;

            // 4. Bot Logic
            bots.forEach((bot, i) => {
                const dist = Math.hypot(player.x - bot.x, player.y - bot.y);
                bot.isHidden = false;
                for(let b of bushes) if(Math.hypot(bot.x-b.x, bot.y-b.y) < b.size/2) bot.isHidden = true;

                if (dist < 400 && !player.isHidden) {
                    bot.angle = Math.atan2(player.y - bot.y, player.x - bot.x);
                    if (dist < 90 && Math.random() < 0.05) triggerAttack(bot);
                } else if (Math.random() < 0.02) bot.angle += (Math.random()-0.5);

                bot.x += Math.cos(bot.angle)*bot.speed + bot.vx;
                bot.y += Math.sin(bot.angle)*bot.speed + bot.vy;
                bot.vx *= 0.85; bot.vy *= 0.85;
                bot.x = Math.max(bot.radius, Math.min(WORLD_SIZE-bot.radius, bot.x));
                bot.y = Math.max(bot.radius, Math.min(WORLD_SIZE-bot.radius, bot.y));

                checkHit(player, bot); checkHit(bot, player);

                if (bot.hp <= 0) { 
                    bot.x = Math.random()*WORLD_SIZE; bot.y = Math.random()*WORLD_SIZE; bot.hp = 100; 
                    kills++; document.getElementById('score').innerText = "Kills: " + kills; 
                }
            });

            if (player.hp <= 0) location.reload();
        }

        function checkHit(atk, vic) {
            if (!atk.isAttacking) return;
            const sa = atk.angle + atk.swingAngle;
            const sx = atk.x + Math.cos(sa)*65, sy = atk.y + Math.sin(sa)*65;
            if (Math.hypot(sx - vic.x, sy - vic.y) < vic.radius + 20) {
                vic.hp -= 4;
                const kd = Math.atan2(vic.y - atk.y, vic.x - atk.x);
                vic.vx += Math.cos(kd)*18; vic.vy += Math.sin(kd)*18;
            }
        }

        function drawEntity(e) {
            ctx.save();
            ctx.translate(e.x - camera.x, e.y - camera.y);
            
            ctx.globalAlpha = e.isHidden ? 0.4 : 1.0;

            // Name & Health
            ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Segoe UI'; ctx.textAlign = 'center';
            ctx.fillText(e.name, 0, -55);
            ctx.fillStyle = '#111'; ctx.fillRect(-25, -45, 50, 6);
            ctx.fillStyle = e.isPlayer ? '#00e676' : '#ff1744';
            ctx.fillRect(-25, -45, 50 * (e.hp/e.maxHp), 6);

            // Sprite
            ctx.rotate(e.angle);
            
            // Sword Logic
            ctx.save();
            if (e.isAttacking) { 
                ctx.rotate(e.swingAngle); 
                e.swingAngle += 0.35; 
                if(e.swingAngle > 1.2) e.isAttacking = false; 
            }
            ctx.fillStyle = '#eee'; ctx.fillRect(25, -4, 45, 8); 
            ctx.fillStyle = '#555'; ctx.fillRect(25, -12, 6, 24);
            ctx.restore();

            // Body
            ctx.beginPath(); ctx.arc(0, 0, e.radius, 0, Math.PI * 2);
            ctx.fillStyle = e.color; ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();

            ctx.restore();
            ctx.globalAlpha = 1.0;
        }

        function draw() {
            ctx.fillStyle = '#111'; ctx.fillRect(0, 0, w, h);
            if(!gameActive) { requestAnimationFrame(draw); return; }

            update();

            // 1. Draw World
            ctx.save();
            ctx.translate(-camera.x, -camera.y);
            
            ctx.fillStyle = currentTheme.bg; ctx.fillRect(0,0, WORLD_SIZE, WORLD_SIZE);
            ctx.fillStyle = currentTheme.alt;
            for(let x=0; x<WORLD_SIZE; x+=200) for(let y=0; y<WORLD_SIZE; y+=200) ctx.fillRect(x,y,100,100);

            // 2. Draw Entities
            bots.forEach(drawEntity);
            drawEntity(player);

            // 3. Draw Bushes
            ctx.fillStyle = currentTheme.bush;
            bushes.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, b.size/2, 0, Math.PI*2); ctx.fill(); });
            
            ctx.restore();

            // 4. Draw UI
            mCtx.clearRect(0,0,120,120);
            const ms = 120/WORLD_SIZE;
            mCtx.fillStyle = '#00e5ff'; mCtx.fillRect(player.x*ms, player.y*ms, 5, 5);
            mCtx.fillStyle = '#ff1744'; bots.forEach(b => mCtx.fillRect(b.x*ms, b.y*ms, 3, 3));
            
            requestAnimationFrame(draw);
        }

        window.onresize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
        draw();
    </script>
</body>
</html>
