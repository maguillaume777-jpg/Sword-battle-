<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sword Battle</title>
    <style>
        :root { --primary: #00e676; --accent: #ffd700; --bg-dark: #1a1a1a; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #menu, #game-over, #shop-menu { 
            position: absolute; inset: 0; 
            background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 2000; color: white; backdrop-filter: blur(10px); 
        }
        #game-over, #shop-menu { display: none; }

        .menu-box { 
            background: rgba(35, 35, 35, 0.9); 
            padding: 30px; border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.1); 
            width: 340px; text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        #openShopBtn { 
            position: absolute; top: 25px; right: 25px; 
            padding: 12px 24px; background: var(--accent); 
            color: #000; border-radius: 14px; font-weight: 900; 
            border: none; cursor: pointer; z-index: 2501;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        .shop-container { width: 90%; max-width: 420px; max-height: 80vh; background: #222; border-radius: 24px; border: 2px solid #444; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; overflow-y: auto; padding: 10px; }
        .shop-item { 
            background: #2a2a2a; padding: 15px; border-radius: 18px; 
            border: 2px solid #3d3d3d; cursor: pointer; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .shop-item.owned { border-color: var(--primary); }
        .shop-item.selected { background: #333; border-color: #2196f3; box-shadow: 0 0 20px rgba(33, 150, 243, 0.3); }
        
        .preview-canvas { width: 90px; height: 90px; margin: 10px 0; }
        .coin-count { color: var(--accent); font-weight: bold; font-size: 20px; margin-bottom: 15px; }
        input, select { width: 90%; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #444; background: #111; color: white; }
        
        button.main-btn { width: 95%; padding: 15px; margin-top: 10px; border-radius: 12px; border: none; font-size: 18px; background: var(--primary); font-weight: bold; cursor: pointer; color: #000; }

        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 15px 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); display: none; z-index: 1000; }
        #right-ui { position: absolute; top: 20px; right: 20px; display: none; flex-direction: column; gap: 15px; z-index: 1000; }
        #minimap-container { width: 150px; height: 150px; background: rgba(0,0,0,0.8); border: 2px solid rgba(255,255,255,0.4); border-radius: 12px; overflow: hidden; }
        #leaderboard { width: 150px; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 10px; color: white; font-size: 12px; }
        
        .touch-ctrl { position: absolute; border-radius: 50%; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); display: none; z-index: 1500; align-items: center; justify-content: center; }
        #joystick-base { bottom: 50px; left: 50px; width: 120px; height: 120px; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; opacity: 0.4; }
        #dash-btn { bottom: 170px; right: 50px; width: 70px; height: 70px; color: white; font-weight: bold; }
        #atk-btn { bottom: 40px; right: 40px; width: 110px; height: 110px; background: rgba(255, 23, 68, 0.3); border-color: rgba(255,23,68,0.5); color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="menu">
        <button id="openShopBtn">SHOP</button>
        <div class="menu-box">
            <h1 style="color:var(--primary); margin: 0 0 5px 0; letter-spacing: 2px; text-transform: uppercase;">SWORD BATTLE</h1>
            <div class="coin-count" id="menu-coins">Coins: 0</div>
            <input type="text" id="username" placeholder="Enter Name..." maxlength="12">
            <select id="worldSelect">
                <option value="grass">Grassy Plains</option>
                <option value="lava">Volcanic Ember</option>
                <option value="ocean">Deep Ocean</option>
            </select>
            <button id="startBtn" class="main-btn">BATTLE NOW</button>
        </div>
    </div>

    <div id="shop-menu">
        <div class="shop-container">
            <h2 style="margin:0; color:var(--accent); text-align:center;">SKINS</h2>
            <div id="shop-coin-display" class="coin-count" style="text-align:center;">Coins: 0</div>
            <div class="shop-grid" id="shop-grid"></div>
            <button id="closeShopBtn" style="background:#444; color:white; border:none; padding:12px; border-radius:10px; margin-top:10px;">CLOSE</button>
        </div>
    </div>

    <div id="game-over">
        <div class="menu-box">
            <h1 style="color:#ff1744">DEFEATED</h1>
            <p id="final-stats">Kills: 0 | Tier: 1</p>
            <button id="respawnBtn" class="main-btn">REMATCH</button>
            <button id="menuBtn" style="background:transparent; color:white; border:1px solid #555; width:95%; padding:12px; margin-top:10px; border-radius:10px;">HOME</button>
        </div>
    </div>

    <div id="ui">
        <div id="ui-name-static" style="font-weight:900; color:var(--primary); font-size: 18px;">Player</div>
        <div id="xp-display" style="font-size:12px; opacity:0.8; margin-bottom: 5px;">Tier 1: 0 / 100</div>
        <div style="display: flex; gap: 15px;">
            <div id="score" style="font-size:14px; font-weight:bold; color:#fff;">Kills: 0</div>
            <div id="ingame-coins" style="font-size:14px; font-weight:bold; color:var(--accent);">Coins: 0</div>
        </div>
    </div>

    <div id="right-ui">
        <div id="minimap-container"><canvas id="minimap" width="150" height="150"></canvas></div>
        <div id="leaderboard"><div id="lb-list"></div></div>
    </div>

    <div id="joystick-base" class="touch-ctrl"><div id="joystick-stick"></div></div>
    <div id="dash-btn" class="touch-ctrl">DASH</div>
    <div id="atk-btn" class="touch-ctrl">SWING</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const miniCanvas = document.getElementById('minimap');
        const miniCtx = miniCanvas.getContext('2d');
        
        const menu = document.getElementById('menu'), gameOverScreen = document.getElementById('game-over'), shopMenu = document.getElementById('shop-menu');
        const uiLayer = document.getElementById('ui'), rightUI = document.getElementById('right-ui'), lbList = document.getElementById('lb-list');
        const joyBase = document.getElementById('joystick-base'), joyStick = document.getElementById('joystick-stick');

        let w = canvas.width = window.innerWidth, h = canvas.height = window.innerHeight;
        let gameActive = false, menuActive = true, kills = 0, sessionCoins = 0;
        const joyState = { x: 0, y: 0, active: false, id: null };
        const WORLD_SIZE = 6000; 
        const camera = { x: WORLD_SIZE/2, y: WORLD_SIZE/2, zoom: 0.8 };
        const bushes = [], bots = [], xpGems = [], damageTexts = [];
        let menuCamAngle = 0;

        let totalCoins = parseInt(localStorage.getItem('sb_coins')) || 0;
        let ownedSkins = JSON.parse(localStorage.getItem('sb_owned')) || ['Default'];
        let selectedSkinName = localStorage.getItem('sb_selected') || 'Default';

        const skins = {
            'Default': { color: '#2196f3', sword: '#ffffff', hilt: '#222222', price: 0 },
            'Crimson': { color: '#d32f2f', sword: '#ff5252', hilt: '#330000', price: 500 },
            'Emerald': { color: '#2e7d32', sword: '#00e676', hilt: '#003300', price: 1200 },
            'Void': { color: '#4a148c', sword: '#ea80fc', hilt: '#1a0033', price: 3000 },
            'Gold': { color: '#ff8f00', sword: '#ffff00', hilt: '#5d4037', price: 7000 }
        };

        function updateShopUI() {
            document.getElementById('menu-coins').innerText = `Coins: ${totalCoins}`;
            document.getElementById('shop-coin-display').innerText = `Coins: ${totalCoins}`;
            const grid = document.getElementById('shop-grid'); grid.innerHTML = '';
            Object.keys(skins).forEach(name => {
                const s = skins[name]; const isOwned = ownedSkins.includes(name); const isSelected = selectedSkinName === name;
                const item = document.createElement('div');
                item.className = `shop-item ${isOwned ? 'owned' : ''} ${isSelected ? 'selected' : ''}`;
                const pcvs = document.createElement('canvas'); pcvs.width = 100; pcvs.height = 100; pcvs.className = 'preview-canvas';
                item.innerHTML = `<div style="font-weight:bold; font-size:14px;">${name}</div>`;
                item.appendChild(pcvs);
                item.innerHTML += `<div style="font-size:12px; color:var(--accent); font-weight:bold;">${isOwned ? (isSelected ? 'EQUIPPED' : 'OWNED') : s.price}</div>`;
                item.onclick = () => {
                    if (isOwned) { selectedSkinName = name; localStorage.setItem('sb_selected', name); }
                    else if (totalCoins >= s.price) { totalCoins -= s.price; ownedSkins.push(name); selectedSkinName = name; localStorage.setItem('sb_coins', totalCoins); localStorage.setItem('sb_owned', JSON.stringify(ownedSkins)); localStorage.setItem('sb_selected', name); }
                    updateShopUI();
                };
                grid.appendChild(item);
                const pctx = pcvs.getContext('2d');
                setTimeout(() => {
                    pctx.clearRect(0,0,100,100); pctx.translate(50, 50);
                    pctx.beginPath(); pctx.arc(0, 0, 22, 0, Math.PI*2); pctx.fillStyle = s.color; pctx.fill();
                    pctx.rotate(-0.4); pctx.fillStyle = s.hilt; pctx.fillRect(12, -4, 12, 8);
                    pctx.fillStyle = s.sword; pctx.beginPath(); pctx.moveTo(24, -10); pctx.lineTo(70, -2); pctx.lineTo(70, 2); pctx.lineTo(24, 10); pctx.fill();
                }, 20);
            });
        }

        document.getElementById('openShopBtn').onclick = () => { menu.style.display = 'none'; shopMenu.style.display = 'flex'; updateShopUI(); };
        document.getElementById('closeShopBtn').onclick = () => { shopMenu.style.display = 'none'; menu.style.display = 'flex'; };

        const themes = {
            grass: { bg: '#235e27', sec: '#1d4d20', gem: '#ffd700', bush: 'rgba(25, 80, 25, 0.7)' },
            lava: { bg: '#2b0a08', sec: '#ff4500', gem: '#ffab00', bush: 'rgba(40, 10, 5, 0.8)' },
            ocean: { bg: '#001a33', sec: '#005580', gem: '#00e5ff', bush: 'rgba(0, 30, 50, 0.6)' }
        };
        let currentTheme = themes.grass;

        const player = {
            id: 'player', x: WORLD_SIZE/2, y: WORLD_SIZE/2, radius: 30, hp: 150, maxHp: 150,
            color: '#2196f3', name: "Player", speed: 8, angle: 0, isAttacking: false, 
            swingProgress: 0, hitList: new Set(), dashTimer: 0, dashCooldown: 0, dashAngle: 0,
            kx: 0, ky: 0, xp: 0, totalXp: 0, nextLevel: 100, tier: 1, scale: 1, isPlayer: true, kills: 0, hidden: false, trail: []
        };

        function spawnBot() {
            const tier = Math.floor(Math.random() * 2) + 1;
            bots.push({
                id: Math.random().toString(36).substr(2, 9), x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE,
                radius: 30 * (1+(tier-1)*0.3), hp: 100*tier, maxHp: 100*tier, color: '#f44336', name: "Bot",
                speed: 4.2, angle: Math.random()*Math.PI*2, isAttacking: false, swingProgress: 0, hitList: new Set(), 
                kx: 0, ky: 0, tier: tier, scale: 1+(tier-1)*0.3, isPlayer: false, totalXp: (tier-1)*100, xp: 0, nextLevel: 100, 
                dashTimer: 0, hidden: false, wanderAngle: Math.random()*Math.PI*2, wanderTime: 0, trail: [],
                swordColor: '#fff', hiltColor: '#222', attackCooldown: 0
            });
        }

        document.getElementById('startBtn').onclick = () => {
            player.name = document.getElementById('username').value.trim() || "Player";
            document.getElementById('ui-name-static').innerText = player.name;
            currentTheme = themes[document.getElementById('worldSelect').value];
            const skin = skins[selectedSkinName];
            player.color = skin.color; player.swordColor = skin.sword; player.hiltColor = skin.hilt;
            resetPlayer();
            menu.style.display = 'none'; uiLayer.style.display = 'block'; rightUI.style.display = 'flex';
            document.querySelectorAll('.touch-ctrl').forEach(el => el.style.display = 'flex');
            gameActive = true; menuActive = false;
        };

        function resetPlayer() {
            player.x = WORLD_SIZE/2 + (Math.random()-0.5)*1000;
            player.y = WORLD_SIZE/2 + (Math.random()-0.5)*1000;
            player.hp = 150; player.maxHp = 150; player.xp = 0; player.tier = 1;
            player.scale = 1; player.radius = 30; player.nextLevel = 100; player.totalXp = 0; player.kills = 0; kills = 0; player.trail = []; sessionCoins = 0;
        }

        document.getElementById('respawnBtn').onclick = () => { gameOverScreen.style.display = 'none'; resetPlayer(); gameActive = true; };
        document.getElementById('menuBtn').onclick = () => { location.reload(); };

        function spawnGem(x, y, value) { 
            const val = value || (Math.random() < 0.1 ? 50 : 15);
            xpGems.push({ 
                x: x || Math.random()*WORLD_SIZE, 
                y: y || Math.random()*WORLD_SIZE, 
                val: val, 
                size: val === 50 ? 12 : 6,
                isCoin: val === 50
            }); 
        }
        function addDamageText(x, y, text, color) { damageTexts.push({ x, y, text, color, life: 1.0, vx: (Math.random()-0.5)*2, vy: -2 }); }

        joyBase.addEventListener('touchstart', (e) => { const t = e.changedTouches[0]; joyState.active = true; joyState.id = t.identifier; updateJoy(t); e.preventDefault(); }, {passive: false});
        window.addEventListener('touchmove', (e) => { if (!joyState.active) return; for(let i=0; i<e.changedTouches.length; i++){ if(e.changedTouches[i].identifier === joyState.id){ updateJoy(e.changedTouches[i]); e.preventDefault(); }}}, {passive: false});
        function updateJoy(t){ const r = joyBase.getBoundingClientRect(); const dx = t.clientX - (r.left + r.width/2), dy = t.clientY - (r.top + r.height/2); const dist = Math.min(50, Math.hypot(dx, dy)), a = Math.atan2(dy, dx); joyState.x = (Math.cos(a) * dist) / 50; joyState.y = (Math.sin(a) * dist) / 50; joyStick.style.transform = `translate(${joyState.x * 30}px, ${joyState.y * 30}px)`; }
        window.addEventListener('touchend', (e) => { for(let i=0; i<e.changedTouches.length; i++){ if(e.changedTouches[i].identifier === joyState.id){ joyState.active = false; joyState.x = 0; joyState.y = 0; joyStick.style.transform = 'none'; }}});
        document.getElementById('atk-btn').addEventListener('touchstart', (e) => { e.preventDefault(); if(!player.isAttacking && gameActive) { player.isAttacking = true; player.swingProgress = 0; player.hitList.clear(); }}, {passive: false});
        document.getElementById('dash-btn').addEventListener('touchstart', (e) => { e.preventDefault(); if(player.dashCooldown <= 0 && gameActive) { player.dashTimer = 18; player.dashCooldown = 65; player.dashAngle = player.angle; }}, {passive: false});

        function resolveCollision(a, b) { if (a.dashTimer > 0 || b.dashTimer > 0) return; const dx = b.x - a.x, dy = b.y - a.y, dist = Math.hypot(dx, dy), min = a.radius + b.radius; if (dist < min && dist > 0) { const overlap = (min - dist) / 2; a.x -= (dx/dist)*overlap; a.y -= (dy/dist)*overlap; b.x += (dx/dist)*overlap; b.y += (dy/dist)*overlap; }}
        function checkStealth(ent) { ent.hidden = false; for(let b of bushes) { for(let p of b.parts) { if(Math.hypot(ent.x - (b.x + p.ox), ent.y - (b.y + p.oy)) < p.r * 0.8) { ent.hidden = true; return; }}}}

        function drawBody(e, x, y) {
            if (e.isAttacking && e.trail.length > 1) {
                ctx.beginPath(); ctx.moveTo(e.trail[0].x, e.trail[0].y);
                for (let i = 1; i < e.trail.length; i++) ctx.lineTo(e.trail[i].x, e.trail[i].y);
                ctx.strokeStyle = `rgba(255, 255, 255, ${e.hidden ? 0.1 : 0.4})`;
                ctx.lineWidth = 15 * e.scale; ctx.lineCap = 'round'; ctx.stroke();
            }
            ctx.save(); ctx.translate(x, y);
            if(e.hidden) ctx.globalAlpha = 0.3;

            // Name Overhead
            ctx.fillStyle = "white"; ctx.font = `bold ${14 * e.scale}px Arial`; ctx.textAlign = "center";
            ctx.fillText(e.name, 0, -75 * e.scale);

            if(!e.hidden || (e.isPlayer)) {
                const barW = 60 * e.scale;
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(-barW/2, -62 * e.scale, barW, 8 * e.scale);
                ctx.fillStyle = e.isPlayer ? '#00e676' : '#ff1744';
                ctx.fillRect(-barW/2, -60 * e.scale, barW * (e.hp/e.maxHp), 4 * e.scale);
            }
            ctx.rotate(e.angle); ctx.save();
            const s = e.scale, pivotX = e.radius * 0.7; ctx.translate(pivotX, 0);
            let swingAngle = 0.5;
            if (e.isAttacking) {
                swingAngle = 0.8 - (e.swingProgress * 3.5); e.swingProgress += (0.15 / e.scale); 
                const tipDist = 85 * s;
                const worldTipX = x + Math.cos(e.angle) * pivotX + Math.cos(e.angle + swingAngle) * tipDist;
                const worldTipY = y + Math.sin(e.angle) * pivotX + Math.sin(e.angle + swingAngle) * tipDist;
                e.trail.push({x: worldTipX, y: worldTipY}); if(e.trail.length > 8) e.trail.shift();
                if(e.swingProgress >= 1) { e.isAttacking = false; e.swingProgress = 0; e.hitList.clear(); e.trail = []; }
            }
            ctx.rotate(swingAngle);
            ctx.fillStyle = e.hiltColor || '#222'; ctx.fillRect(0, -4*s, 18*s, 8*s); 
            ctx.fillStyle = e.swordColor || '#fff'; ctx.beginPath(); 
            ctx.moveTo(18*s, -8*s); ctx.lineTo(85*s, -2*s); ctx.lineTo(85*s, 2*s); ctx.lineTo(18*s, 8*s); ctx.fill();
            ctx.restore();
            ctx.beginPath(); ctx.arc(0, 0, e.radius, 0, Math.PI*2); ctx.fillStyle = e.color; ctx.fill();
            ctx.strokeStyle = "rgba(0,0,0,0.2)"; ctx.lineWidth = 4; ctx.stroke();
            ctx.restore();
        }

        function update() {
            if (menuActive) {
                menuCamAngle += 0.002;
                camera.x = WORLD_SIZE/2 + Math.cos(menuCamAngle) * 1200;
                camera.y = WORLD_SIZE/2 + Math.sin(menuCamAngle) * 1200;
                camera.zoom = 0.5;
            }

            if (gameActive && player.hp <= 0) { 
                gameActive = false; 
                totalCoins += sessionCoins;
                localStorage.setItem('sb_coins', totalCoins);
                document.getElementById('final-stats').innerText = `Kills: ${kills} | Tier: ${player.tier}`; 
                gameOverScreen.style.display = 'flex'; 
            }

            const entities = gameActive ? [player, ...bots] : bots;
            
            if (gameActive) {
                camera.zoom += ((1/(1+(player.tier-1)*0.04)) - camera.zoom)*0.1;
                camera.x += (player.x - camera.x)*0.1; camera.y += (player.y - camera.y)*0.1;
                let speed = (player.speed - (player.tier*0.05));
                if (player.dashTimer > 0) {
                    player.x += Math.cos(player.dashAngle) * 18; player.y += Math.sin(player.dashAngle) * 18;
                    player.dashTimer--;
                } else if (joyState.active) { 
                    player.x += joyState.x*speed; player.y += joyState.y*speed; player.angle = Math.atan2(joyState.y, joyState.x); 
                }
                player.x += player.kx; player.y += player.ky; player.kx *= 0.85; player.ky *= 0.85;
                player.x = Math.max(player.radius, Math.min(WORLD_SIZE-player.radius, player.x));
                player.y = Math.max(player.radius, Math.min(WORLD_SIZE-player.radius, player.y));
                if (player.dashCooldown > 0) player.dashCooldown--;
                checkStealth(player);
            }

            entities.forEach(atk => {
                if (!atk.isAttacking) return;
                entities.forEach(vic => {
                    if (atk.id === vic.id || atk.hitList.has(vic.id)) return;
                    const dist = Math.hypot(atk.x-vic.x, atk.y-vic.y);
                    if (dist < 145 * atk.scale) {
                        let dmg = Math.floor(20 * atk.scale); vic.hp -= dmg;
                        atk.hitList.add(vic.id);
                        const knockAngle = Math.atan2(vic.y - atk.y, vic.x - atk.x);
                        vic.kx = Math.cos(knockAngle) * 22; vic.ky = Math.sin(knockAngle) * 22;
                        addDamageText(vic.x, vic.y, dmg, atk.isPlayer ? "#ffeb3b" : "#ff5252");
                        if (vic.hp <= 0) { 
                            atk.kills++; atk.xp += 100*vic.tier; 
                            if(atk.isPlayer) {
                                kills++;
                                sessionCoins += 50 * vic.tier;
                                addDamageText(vic.x, vic.y, `+${50*vic.tier} Coins`, "#ffd700");
                            }
                        }
                    }
                });
            });

            bots.forEach((bot, idx) => {
                checkStealth(bot);
                let target = null, dMin = 600, coinTarget = null, cMin = 500;
                for(let g of xpGems) { let d=Math.hypot(g.x-bot.x, g.y-bot.y); if(d<cMin){ cMin=d; coinTarget=g; }}
                entities.forEach(e => { if(e!==bot && !e.hidden){ let d=Math.hypot(e.x-bot.x, e.y-bot.y); if(d<dMin){ dMin=d; target=e; }} });

                if (target && dMin < 250*bot.scale) {
                    bot.angle = Math.atan2(target.y-bot.y, target.x-bot.x);
                    bot.x += Math.cos(bot.angle)*bot.speed; bot.y += Math.sin(bot.angle)*bot.speed;
                    if (dMin < 150*bot.scale && !bot.isAttacking && bot.attackCooldown <= 0) { 
                        bot.isAttacking = true; bot.swingProgress = 0; bot.hitList.clear(); bot.attackCooldown = 50; 
                    }
                } else if (coinTarget) {
                    bot.angle = Math.atan2(coinTarget.y-bot.y, coinTarget.x-bot.x);
                    bot.x += Math.cos(bot.angle)*bot.speed; bot.y += Math.sin(bot.angle)*bot.speed;
                } else {
                    if(bot.wanderTime <= 0) { bot.wanderAngle = Math.random() * Math.PI * 2; bot.wanderTime = 60 + Math.random() * 120; }
                    bot.x += Math.cos(bot.wanderAngle) * (bot.speed * 0.6); bot.y += Math.sin(bot.wanderAngle) * (bot.speed * 0.6);
                    bot.angle = bot.wanderAngle; bot.wanderTime--;
                }
                if (bot.attackCooldown > 0) bot.attackCooldown--;
                bot.x += bot.kx; bot.y += bot.ky; bot.kx *= 0.85; bot.ky *= 0.85;
                bot.x = Math.max(bot.radius, Math.min(WORLD_SIZE-bot.radius, bot.x));
                bot.y = Math.max(bot.radius, Math.min(WORLD_SIZE-bot.radius, bot.y));
                entities.forEach(other => { if(bot !== other) resolveCollision(bot, other); });
                if (bot.hp <= 0) { 
                    for(let i=0; i<3; i++) spawnGem(bot.x + (Math.random()-0.5)*100, bot.y + (Math.random()-0.5)*100, 50); 
                    bots.splice(idx, 1); spawnBot(); 
                }
            });

            entities.forEach(ent => {
                for (let i = xpGems.length-1; i >= 0; i--) {
                    if (Math.hypot(ent.x - xpGems[i].x, ent.y - xpGems[i].y) < ent.radius+20) {
                        if (xpGems[i].isCoin) {
                            if(ent.isPlayer) sessionCoins += xpGems[i].val;
                        } else {
                            ent.xp += xpGems[i].val; ent.totalXp += xpGems[i].val;
                        }
                        xpGems.splice(i, 1);
                        if (xpGems.length < 180) spawnGem();
                    }
                }
                if (ent.xp >= ent.nextLevel) {
                    ent.tier++; ent.xp -= ent.nextLevel; ent.nextLevel = Math.floor(ent.nextLevel * 1.8);
                    ent.scale += 0.12; ent.radius = 30 * ent.scale; ent.maxHp += 40; ent.hp = ent.maxHp;
                }
            });

            for (let i = damageTexts.length-1; i >= 0; i--) { damageTexts[i].y += damageTexts[i].vy; damageTexts[i].life -= 0.02; if(damageTexts[i].life <= 0) damageTexts.splice(i, 1); }
            const ranked = [player, ...bots].sort((a,b)=>b.totalXp - a.totalXp).slice(0, 5);
            lbList.innerHTML = ranked.map((e,i)=>`<div style="display:flex; justify-content:space-between; ${e.isPlayer?'color:var(--primary);font-weight:900;':''}"><span>${i+1}. ${e.name}</span><span>${Math.floor(e.totalXp/10)}</span></div>`).join('');
        }

        function draw() {
            ctx.fillStyle = '#111'; ctx.fillRect(0,0,w,h);
            update();
            ctx.save(); ctx.translate(w/2, h/2); ctx.scale(camera.zoom, camera.zoom); ctx.translate(-camera.x, -camera.y);
            ctx.fillStyle = currentTheme.bg; ctx.fillRect(0,0,WORLD_SIZE, WORLD_SIZE);
            
            const time = Date.now() * 0.002;
            if(currentTheme === themes.lava) {
                for(let x=0; x<WORLD_SIZE; x+=300) for(let y=0; y<WORLD_SIZE; y+=300) {
                    ctx.fillStyle = `rgba(255, 69, 0, ${0.08 + Math.sin(time + (x+y)*0.01)*0.04})`; ctx.fillRect(x, y, 220, 220);
                }
            } else if(currentTheme === themes.ocean) {
                for(let x=0; x<WORLD_SIZE; x+=400) for(let y=0; y<WORLD_SIZE; y+=400) {
                    ctx.fillStyle = `rgba(0, 119, 190, ${0.15 + Math.cos(time*0.5 + x*0.01)*0.08})`;
                    ctx.beginPath(); ctx.arc(x, y, 160 + Math.sin(time)*30, 0, Math.PI*2); ctx.fill();
                }
            } else {
                ctx.fillStyle = currentTheme.sec;
                for(let x=0; x<WORLD_SIZE; x+=200) for(let y=0; y<WORLD_SIZE; y+=200) if((x+y)%400 === 0) ctx.fillRect(x, y, 80, 80);
            }
            
            xpGems.forEach(g => { 
                ctx.beginPath(); ctx.arc(g.x, g.y, g.size, 0, Math.PI*2); 
                ctx.fillStyle = g.isCoin ? "#ffd700" : currentTheme.gem;
                ctx.fill(); 
                if(g.isCoin) { ctx.strokeStyle = "#b8860b"; ctx.lineWidth = 2; ctx.stroke(); }
            });
            bots.forEach(b => drawBody(b, b.x, b.y));
            if (gameActive && player.hp > 0) {
                if(player.dashTimer > 0) { ctx.globalAlpha = 0.3; drawBody(player, player.x-Math.cos(player.dashAngle)*40, player.y-Math.sin(player.dashAngle)*40); ctx.globalAlpha = 1; }
                drawBody(player, player.x, player.y);
            }
            ctx.fillStyle = currentTheme.bush; 
            bushes.forEach(b => b.parts.forEach(p => { ctx.beginPath(); ctx.arc(b.x+p.ox, b.y+p.oy, p.r, 0, Math.PI*2); ctx.fill(); }));
            damageTexts.forEach(d => { ctx.save(); ctx.globalAlpha = d.life; ctx.fillStyle = d.color; ctx.font = "bold 24px Arial"; ctx.textAlign = "center"; ctx.fillText(d.text, d.x, d.y); ctx.restore(); });
            ctx.strokeStyle = '#ff1744'; ctx.lineWidth = 20; ctx.strokeRect(0,0,WORLD_SIZE, WORLD_SIZE);
            ctx.restore();
            
            if (gameActive) {
                // FIXED MINIMAP LOGIC
                miniCtx.clearRect(0, 0, 150, 150); // Clear old frame
                miniCtx.fillStyle = 'rgba(0,0,0,0.85)';
                miniCtx.fillRect(0,0,150,150); // Fill background
                
                const s = 150 / WORLD_SIZE; // Global scale ratio (150px / 6000px)
                
                // Draw map border on minimap
                miniCtx.strokeStyle = "rgba(255,255,255,0.2)";
                miniCtx.strokeRect(0, 0, 150, 150);

                // Draw all enemies
                miniCtx.fillStyle = '#ff1744';
                bots.forEach(b => {
                    if(!b.hidden) {
                        miniCtx.beginPath();
                        miniCtx.arc(b.x * s, b.y * s, 1.5, 0, Math.PI * 2);
                        miniCtx.fill();
                    }
                });

                // Draw player
                miniCtx.fillStyle = '#00e676';
                miniCtx.beginPath();
                miniCtx.arc(player.x * s, player.y * s, 2.5, 0, Math.PI * 2);
                miniCtx.fill();
                
                document.getElementById('xp-display').innerText = `Tier ${player.tier}: ${Math.floor(player.xp)} / ${player.nextLevel}`;
                document.getElementById('score').innerText = "Kills: " + kills;
                document.getElementById('ingame-coins').innerText = "Coins: " + sessionCoins;
            }
            requestAnimationFrame(draw);
        }
        window.onresize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
        for(let i=0; i<60; i++) {
            let bx = Math.random()*WORLD_SIZE, by = Math.random()*WORLD_SIZE, parts = [];
            for(let p=0; p<7; p++) parts.push({ ox: (Math.random()-0.5)*180, oy: (Math.random()-0.5)*180, r: 70 + Math.random()*80 });
            bushes.push({ x: bx, y: by, parts: parts });
        }
        for(let i=0; i<35; i++) spawnBot();
        for(let i=0; i<180; i++) spawnGem();
        draw();
    </script>
</body>
</html>
