<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sword Battle Royale</title>
    <style>
        :root { --primary: #00e676; --accent: #ffd700; --bg-dark: #1a1a1a; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #menu, #game-over, #shop-menu, #settings-menu { 
            position: absolute; inset: 0; 
            background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 2000; color: white; backdrop-filter: blur(10px); 
        }
        
        #game-over { display: none; opacity: 0; transition: opacity 0.8s ease-in-out; }
        #game-over.show { display: flex; opacity: 1; }
        #shop-menu, #settings-menu { display: none; }

        .menu-box { 
            background: rgba(35, 35, 35, 0.9); 
            padding: 30px; border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.1); 
            width: 340px; text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }

        #openShopBtn, #openSettingsBtn { 
            position: absolute; top: 25px; padding: 12px 24px; 
            color: #000; border-radius: 14px; font-weight: 900; 
            border: none; cursor: pointer; z-index: 2501;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        #openShopBtn { right: 25px; background: var(--accent); }
        #openSettingsBtn { right: 140px; background: #eee; }

        .shop-container { width: 90%; max-width: 600px; max-height: 85vh; background: #222; border-radius: 24px; border: 2px solid #444; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; overflow-y: auto; padding: 10px; }
        .shop-item { 
            background: #2a2a2a; padding: 15px; border-radius: 18px; 
            border: 2px solid #3d3d3d; cursor: pointer; 
            display: flex; flex-direction: column; align-items: center; 
            transition: transform 0.2s;
        }
        .shop-item:active { transform: scale(0.95); }
        .shop-item.owned { border-color: var(--primary); }
        .shop-item.selected { background: #333; border-color: #2196f3; box-shadow: 0 0 20px rgba(33, 150, 243, 0.3); }
        
        .preview-canvas { width: 80px; height: 80px; margin: 5px 0; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .coin-count { color: var(--accent); font-weight: bold; font-size: 20px; margin-bottom: 15px; }
        input, select { width: 90%; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #444; background: #111; color: white; }
        
        button.main-btn { width: 95%; padding: 15px; margin-top: 10px; border-radius: 12px; border: none; font-size: 18px; background: var(--primary); font-weight: bold; cursor: pointer; color: #000; }

        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 15px 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); display: none; z-index: 1000; }
        #right-ui { position: absolute; top: 20px; right: 20px; display: none; flex-direction: column; gap: 10px; z-index: 1000; align-items: flex-end; }
        #leaderboard { width: 160px; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 10px; color: white; font-size: 12px; }
        #minimap-container { width: 150px; height: 150px; background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; overflow: hidden; backdrop-filter: blur(5px); }

        .touch-ctrl { position: absolute; border-radius: 50%; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); display: none; z-index: 1500; align-items: center; justify-content: center; }
        #joystick-base { bottom: 50px; left: 50px; width: 120px; height: 120px; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; opacity: 0.4; }
        #dash-btn { bottom: 170px; right: 50px; width: 70px; height: 70px; color: white; font-weight: bold; }
        #atk-btn { bottom: 40px; right: 40px; width: 110px; height: 110px; background: rgba(255, 23, 68, 0.3); border-color: rgba(255,23,68,0.5); color: white; font-weight: bold; }
        
        #bush-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 900; background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.85) 100%); opacity: 0; transition: opacity 0.4s ease; }
    </style>
</head>
<body>

    <div id="bush-overlay"></div>
    <div id="menu">
        <button id="openShopBtn">SHOP</button>
        <button id="openSettingsBtn">SETTINGS</button>
        <div class="menu-box">
            <h1 style="color:var(--primary); margin: 0 0 5px 0; letter-spacing: 2px; text-transform: uppercase;">SWORD BATTLE</h1>
            <div class="coin-count" id="menu-coins">Coins: 0</div>
            <input type="text" id="username" placeholder="Enter Name..." maxlength="12">
            <select id="worldSelect">
                <option value="grass">Grassy Plains</option>
                <option value="lava">Volcanic Ember</option>
                <option value="ocean">Deep Ocean</option>
            </select>
            <button id="startBtn" class="main-btn">BATTLE NOW</button>
        </div>
    </div>

    <div id="shop-menu">
        <div class="shop-container">
            <h2 style="margin:0; color:var(--accent); text-align:center;">EQUIPMENT SHOP</h2>
            <div id="shop-coin-display" class="coin-count" style="text-align:center;">Coins: 0</div>
            <div class="shop-grid" id="shop-grid"></div>
            <button id="closeShopBtn" style="background:#444; color:white; border:none; padding:12px; border-radius:10px; margin-top:10px; font-weight:bold; cursor:pointer;">BACK TO MENU</button>
        </div>
    </div>

    <div id="settings-menu">
        <div class="menu-box">
            <h2 style="color:var(--accent)">SETTINGS</h2>
            <label style="font-size:12px; display:block; margin-bottom:5px;">BOT DIFFICULTY</label>
            <select id="difficultySelect">
                <option value="0.5">Easy</option>
                <option value="1">Normal</option>
                <option value="1.8">Hard</option>
                <option value="3">Insane</option>
            </select>
            <label style="font-size:12px; display:block; margin-bottom:5px; margin-top:10px;">REDEEM CODE</label>
            <input type="text" id="redeemInput" placeholder="Enter Code...">
            <button id="redeemBtn" style="background:var(--primary); border:none; padding:10px; width:100%; border-radius:10px; font-weight:bold; margin-bottom:10px; cursor:pointer;">REDEEM</button>
            <button id="closeSettingsBtn" style="background:#444; color:white; border:none; padding:12px; border-radius:10px; width:100%; font-weight:bold; cursor:pointer;">BACK</button>
        </div>
    </div>

    <div id="game-over">
        <div class="menu-box">
            <h1 style="color:#ff1744">DEFEATED</h1>
            <p id="final-stats">Kills: 0 | Tier: 1</p>
            <button id="respawnBtn" class="main-btn">REMATCH</button>
            <button id="menuBtn" style="background:transparent; color:white; border:1px solid #555; width:95%; padding:12px; margin-top:10px; border-radius:10px; cursor:pointer;">HOME</button>
        </div>
    </div>

    <div id="ui">
        <div id="ui-name-static" style="font-weight:900; color:var(--primary); font-size: 18px;">Player</div>
        <div id="xp-display" style="font-size:12px; opacity:0.8; margin-bottom: 5px;">Tier 1: 0 / 100</div>
        <div style="display: flex; gap: 15px;">
            <div id="score" style="font-size:14px; font-weight:bold; color:#fff;">Kills: 0</div>
            <div id="ingame-coins" style="font-size:14px; font-weight:bold; color:var(--accent);">Coins: 0</div>
        </div>
    </div>

    <div id="right-ui">
        <div id="minimap-container"><canvas id="minimap"></canvas></div>
        <div id="leaderboard"><b>Leaderboard</b><div id="lb-list"></div></div>
    </div>

    <div id="joystick-base" class="touch-ctrl"><div id="joystick-stick"></div></div>
    <div id="dash-btn" class="touch-ctrl">DASH</div>
    <div id="atk-btn" class="touch-ctrl">SWING</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bushOverlay = document.getElementById('bush-overlay');
        const miniCanvas = document.getElementById('minimap');
        const miniCtx = miniCanvas.getContext('2d');
        miniCanvas.width = 150; miniCanvas.height = 150;

        const menu = document.getElementById('menu'), gameOverScreen = document.getElementById('game-over');
        const shopMenu = document.getElementById('shop-menu'), settingsMenu = document.getElementById('settings-menu');
        const uiLayer = document.getElementById('ui'), rightUI = document.getElementById('right-ui'), lbList = document.getElementById('lb-list');
        const joyBase = document.getElementById('joystick-base'), joyStick = document.getElementById('joystick-stick');

        let w = canvas.width = window.innerWidth, h = canvas.height = window.innerHeight;
        let gameActive = false, menuActive = true, kills = 0, sessionCoins = 0;
        const joyState = { x: 0, y: 0, active: false, id: null };
        const WORLD_SIZE = 6000; 
        const camera = { x: 3000, y: 3000, zoom: 0.8 };
        const bushes = [], bots = [], xpGems = [], damageTexts = [], dashAfterimages = [];
        let menuCamAngle = 0;

        let totalCoins = parseInt(localStorage.getItem('sb_coins')) || 0;
        let ownedSkins = JSON.parse(localStorage.getItem('sb_owned')) || ['Default'];
        let selectedSkinName = localStorage.getItem('sb_selected') || 'Default';
        let botDifficulty = 1.0;

        const skins = {
            'Default': { color: '#2196f3', sword: '#BDC3C7', hilt: '#F1C40F', price: 0, type: 'standard' },
            'Crimson': { color: '#d32f2f', sword: '#E74C3C', hilt: '#2C3E50', price: 500, type: 'standard' },
            'Emerald': { color: '#2e7d32', sword: '#2ECC71', hilt: '#27AE60', price: 1200, type: 'standard' },
            'Void': { color: '#4a148c', sword: '#9B59B6', hilt: '#000000', price: 2500, type: 'standard' },
            'Gold': { color: '#ffc107', sword: '#FFF176', hilt: '#FF6F00', price: 5000, type: 'standard' },
            'Ice': { color: '#81d4fa', sword: '#E1F5FE', hilt: '#0288D1', price: 2000, type: 'standard' },
            'Shadow': { color: '#212121', sword: '#424242', hilt: '#000000', price: 3500, type: 'standard' },
            'Royal': { color: '#7b1fa2', sword: '#BA68C8', hilt: '#FBC02D', price: 4000, type: 'standard' },
            'Lava': { color: '#ff3d00', sword: '#FF9100', hilt: '#3E2723', price: 4500, type: 'standard' },
            'Toxic': { color: '#76ff03', sword: '#AEEA00', hilt: '#33691E', price: 6000, type: 'standard' },
            'Greatsword': { color: '#546e7a', sword: '#90a4ae', hilt: '#263238', price: 7500, type: 'heavy' },
            'Dagger': { color: '#f06292', sword: '#f8bbd0', hilt: '#880e4f', price: 3000, type: 'light' },
            'Katana': { color: '#ffffff', sword: '#e0e0e0', hilt: '#b71c1c', price: 8500, type: 'long' },
            'Executioner': { color: '#212121', sword: '#616161', hilt: '#000000', price: 9000, type: 'axe' },
            'Paladin': { color: '#fff176', sword: '#ffffff', hilt: '#f9a825', price: 10000, type: 'claymore', body: 'armored' },
            'Cyber': { color: '#00e5ff', sword: '#00e5ff', hilt: '#263238', price: 12000, type: 'glow' },
            'Reaper': { color: '#000000', sword: '#37474f', hilt: '#000000', price: 15000, type: 'scythe' },
            'Barbarian': { color: '#8d6e63', sword: '#bcaaa4', hilt: '#3e2723', price: 5500, type: 'club' },
            'Gladiator': { color: '#ff7043', sword: '#d84315', hilt: '#4e342e', price: 11000, type: 'standard', body: 'spiked' },
            'Dragon': { color: '#c62828', sword: '#ff8a65', hilt: '#212121', price: 20000, type: 'heavy', body: 'scaled' }
        };

        function updateShopUI() {
            document.getElementById('menu-coins').innerText = `Coins: ${totalCoins}`;
            document.getElementById('shop-coin-display').innerText = `Coins: ${totalCoins}`;
            const grid = document.getElementById('shop-grid'); grid.innerHTML = '';
            Object.keys(skins).forEach(name => {
                const s = skins[name]; const isOwned = ownedSkins.includes(name); const isSelected = selectedSkinName === name;
                const item = document.createElement('div'); item.className = `shop-item ${isOwned ? 'owned' : ''} ${isSelected ? 'selected' : ''}`;
                const pcvs = document.createElement('canvas'); pcvs.width = 80; pcvs.height = 80; pcvs.className = 'preview-canvas';
                item.innerHTML = `<div style="font-weight:bold; font-size:14px; margin-bottom:5px;">${name}</div>`;
                item.appendChild(pcvs);
                item.innerHTML += `<div style="font-size:12px; color:var(--accent); font-weight:bold; margin-top:5px;">${isOwned ? (isSelected ? 'EQUIPPED' : 'OWNED') : s.price + ' Coins'}</div>`;
                item.onclick = () => {
                    if (isOwned) { selectedSkinName = name; localStorage.setItem('sb_selected', name); }
                    else if (totalCoins >= s.price) { totalCoins -= s.price; ownedSkins.push(name); selectedSkinName = name; localStorage.setItem('sb_coins', totalCoins); localStorage.setItem('sb_owned', JSON.stringify(ownedSkins)); localStorage.setItem('sb_selected', name); }
                    updateShopUI();
                };
                grid.appendChild(item);
                const pctx = pcvs.getContext('2d'); pctx.save(); pctx.translate(40, 40);
                renderSword(pctx, 15, 0, 0.6, -Math.PI/4, s.sword, s.hilt, s.type);
                pctx.beginPath(); pctx.arc(0, 0, 18, 0, Math.PI*2); pctx.fillStyle = s.color; pctx.fill(); pctx.restore();
            });
        }

        const themes = {
            grass: { bg: '#235e27', sec: '#1d4d20', gem: '#ffd700', bush: 'rgba(25, 80, 25, 0.7)' },
            lava: { bg: '#2b0a08', sec: '#ff4500', gem: '#ffab00', bush: 'rgba(40, 10, 5, 0.8)' },
            ocean: { bg: '#001a33', sec: '#005580', gem: '#00e5ff', bush: 'rgba(0, 30, 50, 0.6)' }
        };
        let currentTheme = themes.grass;

        function renderSword(c, x, y, s, angle, bladeCol, hiltCol, type = 'standard') {
            c.save(); c.translate(x, y); c.rotate(angle);
            c.fillStyle = bladeCol; c.strokeStyle = '#000'; c.lineWidth = 2 * s;
            c.beginPath();
            if (type === 'heavy') { c.moveTo(10*s, -18*s); c.lineTo(95*s, -15*s); c.lineTo(110*s, 0); c.lineTo(95*s, 15*s); c.lineTo(10*s, 18*s); }
            else if (type === 'axe') { c.moveTo(10*s, -2*s); c.lineTo(90*s, -2*s); c.lineTo(90*s, 2*s); c.lineTo(10*s, 2*s); c.moveTo(70*s, -30*s); c.quadraticCurveTo(100*s, 0, 70*s, 30*s); c.lineTo(60*s, 0); }
            else { c.moveTo(15*s, -11*s); c.lineTo(85*s, -6*s); c.lineTo(100*s, 0); c.lineTo(85*s, 6*s); c.lineTo(15*s, 11*s); }
            c.closePath(); c.fill(); c.stroke();
            c.fillStyle = hiltCol; c.fillRect(8*s, -18*s, 8*s, 36*s);
            c.restore();
        }

        const player = {
            id: 'player', x: 3000, y: 3000, radius: 30, hp: 150, maxHp: 150, color: '#2196f3', name: "Player",
            speed: 8, angle: 0, isAttacking: false, swingProgress: 0, hitList: new Set(), dashTimer: 0, dashCooldown: 0,
            kx: 0, ky: 0, stunTimer: 0, xp: 0, nextLevel: 100, tier: 1, scale: 1, kills: 0, hidden: false, trail: []
        };

        function spawnBot() {
            const botSkin = skins[Object.keys(skins)[Math.floor(Math.random()*20)]];
            bots.push({
                id: Math.random().toString(36).substr(2, 5), x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE,
                radius: 30, hp: 100, maxHp: 100, color: botSkin.color, name: "Bot", speed: 4 * botDifficulty,
                angle: Math.random()*Math.PI*2, isAttacking: false, swingProgress: 0, hitList: new Set(),
                kx: 0, ky: 0, stunTimer: 0, tier: 1, xp: 0, nextLevel: 100, swordColor: botSkin.sword, hiltColor: botSkin.hilt, weaponType: botSkin.type
            });
        }

        function resolveCollision(a, b) {
            const dx = b.x - a.x, dy = b.y - a.y, dist = Math.hypot(dx, dy), min = a.radius + b.radius;
            if (dist < min && dist > 0) { const overlap = (min - dist) / 2; a.x -= (dx/dist)*overlap; a.y -= (dy/dist)*overlap; b.x += (dx/dist)*overlap; b.y += (dy/dist)*overlap; }
        }

        function checkStealth(ent) {
            ent.hidden = false;
            for(let b of bushes) {
                if(Math.hypot(ent.x - b.x, ent.y - b.y) < 100) { ent.hidden = true; if(ent === player) bushOverlay.style.opacity = "1"; return; }
            }
            if(ent === player) bushOverlay.style.opacity = "0";
        }

        function drawBody(e, x, y) {
            if (e.hidden && e !== player) return;
            ctx.save(); ctx.translate(x, y);
            if(e.hidden) ctx.globalAlpha = 0.5;
            // Health Bar with black border
            ctx.fillStyle = "black"; ctx.fillRect(-32, -52, 64, 12);
            ctx.fillStyle = "#333"; ctx.fillRect(-30, -50, 60, 8);
            ctx.fillStyle = e === player ? "#00e676" : "#ff1744";
            ctx.fillRect(-30, -50, 60 * (e.hp/e.maxHp), 8);
            // Body
            ctx.fillStyle = e.color; ctx.beginPath(); ctx.arc(0,0,e.radius,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 3; ctx.stroke();
            // Weapon
            let sa = e.isAttacking ? (1.05 - (e.swingProgress * 2.1)) : 0.7;
            renderSword(ctx, e.radius, 0, e.scale, e.angle + sa, e.swordColor || '#ccc', e.hiltColor || '#666', e.weaponType);
            ctx.restore();
        }

        function update() {
            if(!gameActive) return;
            // Movement logic
            if(joyState.active && player.stunTimer <= 0) {
                player.x += joyState.x * player.speed; player.y += joyState.y * player.speed;
                player.angle = Math.atan2(joyState.y, joyState.x);
            }
            player.x = Math.max(0, Math.min(WORLD_SIZE, player.x));
            player.y = Math.max(0, Math.min(WORLD_SIZE, player.y));
            
            checkStealth(player);
            camera.x += (player.x - camera.x) * 0.1; camera.y += (player.y - camera.y) * 0.1;

            // Hit detection loop
            [player, ...bots].forEach(atk => {
                if(!atk.isAttacking) return;
                atk.swingProgress += 0.15;
                [player, ...bots].forEach(vic => {
                    if(atk === vic || atk.hitList.has(vic.id)) return;
                    if(Math.hypot(atk.x-vic.x, atk.y-vic.y) < (atk.radius + vic.radius + 80)) {
                        vic.hp -= 20; atk.hitList.add(vic.id);
                        if(vic.hp <= 0 && atk === player) { kills++; sessionCoins += 100; totalCoins += 100; }
                    }
                });
                if(atk.swingProgress >= 1) { atk.isAttacking = false; atk.swingProgress = 0; atk.hitList.clear(); }
            });

            // Mini-map update
            miniCtx.fillStyle = "rgba(0,0,0,0.6)"; miniCtx.fillRect(0,0,150,150);
            const ms = 150/WORLD_SIZE;
            miniCtx.fillStyle = "white"; miniCtx.beginPath(); miniCtx.arc(player.x*ms, player.y*ms, 4, 0, Math.PI*2); miniCtx.fill();
        }

        function draw() {
            ctx.fillStyle = currentTheme.bg; ctx.fillRect(0,0,w,h);
            ctx.save(); ctx.translate(w/2, h/2); ctx.scale(camera.zoom, camera.zoom); ctx.translate(-camera.x, -camera.y);
            // World Grid
            ctx.strokeStyle = currentTheme.sec; ctx.lineWidth = 2;
            for(let i=0; i<=WORLD_SIZE; i+=200) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,WORLD_SIZE); ctx.stroke(); }
            // Objects
            xpGems.forEach(g => { ctx.fillStyle = currentTheme.gem; ctx.beginPath(); ctx.arc(g.x, g.y, 6, 0, Math.PI*2); ctx.fill(); });
            bushes.forEach(b => { ctx.fillStyle = currentTheme.bush; ctx.beginPath(); ctx.arc(b.x, b.y, 80, 0, Math.PI*2); ctx.fill(); });
            [player, ...bots].forEach(e => drawBody(e, e.x, e.y));
            ctx.restore();
        }

        // Event Handlers
        document.getElementById('startBtn').onclick = () => {
            currentTheme = themes[document.getElementById('worldSelect').value];
            gameActive = true; menu.style.display = 'none'; uiLayer.style.display = 'block'; rightUI.style.display = 'flex';
            document.querySelectorAll('.touch-ctrl').forEach(el => el.style.display = 'flex');
        };

        // Initialization
        for(let i=0; i<50; i++) bushes.push({x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE});
        for(let i=0; i<100; i++) xpGems.push({x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE});
        for(let i=0; i<15; i++) spawnBot();

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
        updateShopUI();
    </script>
</body>
</html>
