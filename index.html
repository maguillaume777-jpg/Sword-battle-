<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SwordsBattle.io | Original Animation Style</title>
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body, html { 
            margin: 0; padding: 0; 
            overflow: hidden; 
            background: #111; 
            font-family: 'Segoe UI', sans-serif; 
            touch-action: none;
            position: fixed; 
            width: 100%; height: 100%;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #menu, #game-over {
            position: absolute; inset: 0; background: rgba(0,0,0,0.6);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; color: white; backdrop-filter: blur(4px);
        }
        #game-over { display: none; background: rgba(0,0,0,0.85); }
        .menu-box { background: #222; padding: 30px; border-radius: 20px; border: 2px solid #444; width: 280px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        button { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; background: #00e676; font-weight: bold; cursor: pointer; color: #000; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 12px; pointer-events: none; z-index: 1000; display: none; }
        #right-ui { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; display: none; }
        #minimap-container { width: 160px; height: 160px; background: rgba(0,0,0,0.6); border: 3px solid #444; border-radius: 8px; overflow: hidden; }
        #minimap { width: 100%; height: 100%; }
        #leaderboard { width: 160px; background: rgba(0,0,0,0.7); border: 2px solid #444; border-radius: 8px; padding: 8px; color: white; font-size: 12px; }
        .lb-entry { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .lb-me { color: #00e676; font-weight: bold; }

        .touch-ctrl { position: absolute; border-radius: 50%; background: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255, 255, 255, 0.3); display: none; z-index: 1500; align-items: center; justify-content: center; color: white; font-weight: bold; }
        #joystick-base { bottom: 60px; left: 60px; width: 120px; height: 120px; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; opacity: 0.6; pointer-events: none; }
        #dash-btn { bottom: 180px; right: 60px; width: 70px; height: 70px; }
        #atk-btn { bottom: 50px; right: 50px; width: 110px; height: 110px; background: rgba(255, 0, 0, 0.4); }
    </style>
</head>
<body>

    <div id="menu">
        <div class="menu-box">
            <h1 style="color:#00e676; margin-top: 0;">SWORDS BATTLE</h1>
            <input type="text" id="username" placeholder="Name..." style="width:85%; padding:10px; margin-bottom:10px; border-radius: 5px; border: 1px solid #444; background: #333; color: white;">
            <select id="worldSelect" style="width:90%; padding:10px; margin-bottom:10px; border-radius: 5px; background: #333; color: white; border: 1px solid #444;">
                <option value="grass">Grassy Plains</option>
                <option value="lava">Volcanic Ember</option>
                <option value="ocean">Deep Ocean</option>
            </select>
            <button id="startBtn">START GAME</button>
        </div>
    </div>

    <div id="game-over">
        <div class="menu-box">
            <h1 style="color:#ff1744">GAME OVER</h1>
            <p id="final-stats">Kills: 0 | Tier: 1</p>
            <button id="respawnBtn">PLAY AGAIN</button>
            <button id="menuBtn" style="background:#555; color:white;">MAIN MENU</button>
        </div>
    </div>

    <div id="ui">
        <h2 id="ui-name" style="margin:0; font-size: 16px;">Player</h2>
        <div id="xp-display">XP: 0 / 100</div>
        <div id="score">Kills: 0</div>
    </div>

    <div id="right-ui">
        <div id="minimap-container"><canvas id="minimap" width="160" height="160"></canvas></div>
        <div id="leaderboard">
            <div style="text-align:center; border-bottom:1px solid #555; margin-bottom:5px; padding-bottom:2px;">RANKING (XP)</div>
            <div id="lb-list"></div>
        </div>
    </div>

    <div id="joystick-base" class="touch-ctrl"><div id="joystick-stick"></div></div>
    <div id="dash-btn" class="touch-ctrl">DASH</div>
    <div id="atk-btn" class="touch-ctrl">SWING</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const miniCanvas = document.getElementById('minimap');
        const miniCtx = miniCanvas.getContext('2d');
        const menu = document.getElementById('menu'), gameOverScreen = document.getElementById('game-over');
        const uiLayer = document.getElementById('ui'), rightUI = document.getElementById('right-ui'), lbList = document.getElementById('lb-list');
        const joyBase = document.getElementById('joystick-base'), joyStick = document.getElementById('joystick-stick');

        let w = canvas.width = window.innerWidth, h = canvas.height = window.innerHeight;
        let gameActive = false, menuActive = true, kills = 0;
        const joyState = { x: 0, y: 0, active: false, id: null };
        const WORLD_SIZE = 6000; 
        const camera = { x: WORLD_SIZE/2, y: WORLD_SIZE/2, zoom: 0.8 };
        const bushes = [], bots = [], xpGems = [], damageTexts = [];

        const themes = {
            grass: { bg: '#2e7d32', gem: '#ffd700', bush: 'rgba(34, 139, 34, 0.7)' },
            lava: { bg: '#bf360c', gem: '#ffab00', bush: 'rgba(74, 34, 20, 0.7)' },
            ocean: { bg: '#01579b', gem: '#00e5ff', bush: 'rgba(0, 70, 90, 0.6)' }
        };
        let currentTheme = themes.grass;

        const player = {
            id: 'player', x: WORLD_SIZE/2, y: WORLD_SIZE/2, radius: 30, hp: 100, maxHp: 100,
            color: '#2196f3', name: "Player", speed: 8, angle: 0, isAttacking: false, 
            swingProgress: 0, hitList: new Set(), dashTimer: 0, dashCooldown: 0,
            kx: 0, ky: 0, xp: 0, totalXp: 0, nextLevel: 100, tier: 1, scale: 1, isPlayer: true, kills: 0, hidden: false
        };

        function preInitWorld() {
            bushes.length = 0; bots.length = 0; xpGems.length = 0;
            for(let i=0; i<60; i++) {
                let bx = Math.random()*WORLD_SIZE, by = Math.random()*WORLD_SIZE, parts = [];
                let clusterSize = 5 + Math.random()*8;
                for(let p=0; p<clusterSize; p++) parts.push({ ox: (Math.random()-0.5)*150, oy: (Math.random()-0.5)*150, r: 60 + Math.random()*70 });
                bushes.push({ x: bx, y: by, parts: parts });
            }
            for(let i=0; i<35; i++) spawnBot();
            for(let i=0; i<150; i++) spawnGem();
        }
        preInitWorld();

        document.getElementById('startBtn').onclick = () => {
            player.name = document.getElementById('username').value || "Player";
            document.getElementById('ui-name').innerText = player.name;
            currentTheme = themes[document.getElementById('worldSelect').value];
            resetPlayer();
            menu.style.display = 'none'; uiLayer.style.display = 'block'; rightUI.style.display = 'flex';
            document.querySelectorAll('.touch-ctrl').forEach(el => el.style.display = 'flex');
            gameActive = true; menuActive = false;
        };

        function resetPlayer() {
            player.x = WORLD_SIZE/2; player.y = WORLD_SIZE/2;
            player.hp = 100; player.maxHp = 100; player.xp = 0; player.tier = 1;
            player.scale = 1; player.radius = 30; player.nextLevel = 100;
            player.totalXp = 0; player.kills = 0; kills = 0;
        }

        document.getElementById('respawnBtn').onclick = () => { gameOverScreen.style.display = 'none'; resetPlayer(); gameActive = true; };
        document.getElementById('menuBtn').onclick = () => { location.reload(); };

        function spawnBot() {
            const tier = Math.floor(Math.random() * 2) + 1;
            bots.push({
                id: Math.random().toString(36).substr(2, 9), x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE,
                radius: 30 * (1+(tier-1)*0.3), hp: 100*tier, maxHp: 100*tier, color: '#f44336', name: "Bot",
                speed: 4.5, angle: Math.random()*Math.PI*2, isAttacking: false, swingProgress: 0, hitList: new Set(), 
                kx: 0, ky: 0, tier: tier, scale: 1+(tier-1)*0.3, isPlayer: false, totalXp: (tier-1)*100, xp: 0, nextLevel: 100, 
                dashTimer: 0, hidden: false, wanderAngle: Math.random()*Math.PI*2, wanderTime: 0
            });
        }

        function spawnGem(x, y, value) { xpGems.push({ x: x || Math.random()*WORLD_SIZE, y: y || Math.random()*WORLD_SIZE, val: value || 15, size: 5 + Math.random()*5 }); }
        function addDamageText(x, y, text, color) { damageTexts.push({ x, y, text, color, life: 1.0, vx: (Math.random()-0.5)*2, vy: -2 }); }

        joyBase.addEventListener('touchstart', (e) => { 
            const touch = e.changedTouches[0];
            joyState.active = true; joyState.id = touch.identifier; 
            updateJoy(touch);
            e.preventDefault(); 
        }, {passive: false});

        window.addEventListener('touchmove', (e) => {
            if (!joyState.active) return;
            for(let i=0; i<e.changedTouches.length; i++){
                if(e.changedTouches[i].identifier === joyState.id){
                    updateJoy(e.changedTouches[i]);
                    e.preventDefault();
                }
            }
        }, {passive: false});

        function updateJoy(touch){
            const rect = joyBase.getBoundingClientRect();
            const dx = touch.clientX - (rect.left + rect.width/2), dy = touch.clientY - (rect.top + rect.height/2);
            const dist = Math.min(60, Math.hypot(dx, dy)), angle = Math.atan2(dy, dx);
            joyState.x = (Math.cos(angle) * dist) / 60; joyState.y = (Math.sin(angle) * dist) / 60;
            joyStick.style.transform = `translate(${joyState.x * 50}px, ${joyState.y * 50}px)`;
        }

        window.addEventListener('touchend', (e) => { 
            for(let i=0; i<e.changedTouches.length; i++){
                if(e.changedTouches[i].identifier === joyState.id){
                    joyState.active = false; joyState.x = 0; joyState.y = 0; joyStick.style.transform = 'none'; 
                }
            }
        });

        document.getElementById('atk-btn').addEventListener('touchstart', (e) => { e.preventDefault(); if(!player.isAttacking && gameActive) { player.isAttacking = true; player.swingProgress = 0; player.hitList.clear(); } }, {passive: false});
        document.getElementById('dash-btn').addEventListener('touchstart', (e) => { e.preventDefault(); if(player.dashCooldown <= 0 && gameActive) { player.dashTimer = 18; player.dashCooldown = 65; } }, {passive: false});

        function resolveCollision(a, b) {
            if (a.dashTimer > 0 || b.dashTimer > 0) return;
            const dx = b.x - a.x, dy = b.y - a.y, dist = Math.hypot(dx, dy), minDist = a.radius + b.radius;
            if (dist < minDist && dist > 0) {
                const overlap = (minDist - dist) / 2;
                a.x -= (dx/dist)*overlap; a.y -= (dy/dist)*overlap; b.x += (dx/dist)*overlap; b.y += (dy/dist)*overlap;
            }
        }

        function checkStealth(ent) {
            ent.hidden = false;
            for(let b of bushes) {
                for(let p of b.parts) {
                    if(Math.hypot(ent.x - (b.x + p.ox), ent.y - (b.y + p.oy)) < p.r * 0.8) {
                        ent.hidden = true; return;
                    }
                }
            }
        }

        function drawBody(e, x, y) {
            ctx.save(); ctx.translate(x, y);
            if(e.hidden) ctx.globalAlpha = 0.35;

            if(!e.hidden || (e.isPlayer)) {
                const barW = 60 * e.scale;
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(-barW/2 - 2, -62 * e.scale, barW + 4, 12 * e.scale);
                ctx.fillStyle = e.isPlayer ? '#00e676' : '#ff1744';
                ctx.fillRect(-barW/2, -60 * e.scale, barW * (e.hp/e.maxHp), 8 * e.scale);
            }
            
            ctx.rotate(e.angle);
            ctx.save();
            
            // PIVOTED SWORD ANIMATION (ORIGINAL SWORDBATTLE.IO STYLE)
            // Pivot the sword from a point on the circle's edge
            const s = e.scale;
            const pivotX = e.radius * 0.7; // Side of the character
            const pivotY = 0;
            ctx.translate(pivotX, pivotY);

            let swingAngle = 0.5; // Idle angle (tilted slightly forward)
            if (e.isAttacking) {
                // Circular arc from roughly 45deg to -135deg
                swingAngle = 0.8 - (e.swingProgress * 3.5); 
                e.swingProgress += (0.16 / e.scale); 
                if(e.swingProgress >= 1) { e.isAttacking = false; e.swingProgress = 0; e.hitList.clear(); }
            }
            ctx.rotate(swingAngle);
            
            // Draw Sword relative to the pivot
            ctx.fillStyle = '#222'; ctx.fillRect(0, -4*s, 18*s, 8*s); // Hilt
            ctx.fillStyle = '#999'; ctx.fillRect(18*s, -12*s, 6*s, 24*s); // Guard
            ctx.fillStyle = '#fff'; ctx.beginPath(); // Blade
            ctx.moveTo(24*s, -8*s); ctx.lineTo(85*s, -2*s); ctx.lineTo(85*s, 2*s); ctx.lineTo(24*s, 8*s); ctx.fill();
            
            ctx.restore();
            
            // Character Circle
            ctx.beginPath(); ctx.arc(0, 0, e.radius, 0, Math.PI*2); ctx.fillStyle = e.color; ctx.fill();
            ctx.strokeStyle = "rgba(0,0,0,0.2)"; ctx.lineWidth = 4; ctx.stroke();
            ctx.restore();
        }

        function update() {
            if (gameActive && player.hp <= 0) { gameActive = false; document.getElementById('final-stats').innerText = `Kills: ${kills} | Tier: ${player.tier}`; gameOverScreen.style.display = 'flex'; }
            if (gameActive) {
                camera.zoom += ((1/(1+(player.tier-1)*0.12)) - camera.zoom)*0.1;
                camera.x += (player.x - camera.x)*0.1; camera.y += (player.y - camera.y)*0.1;
                let ms = (player.speed - (player.tier*0.05)) + (player.dashTimer > 0 ? 16 : 0);
                if (player.dashTimer > 0) player.dashTimer--;
                if (player.dashCooldown > 0) player.dashCooldown--;
                if (joyState.active) { player.x += joyState.x*ms; player.y += joyState.y*ms; player.angle = Math.atan2(joyState.y, joyState.x); }
                player.x += player.kx; player.y += player.ky; player.kx *= 0.85; player.ky *= 0.85;
                player.x = Math.max(player.radius, Math.min(WORLD_SIZE-player.radius, player.x));
                player.y = Math.max(player.radius, Math.min(WORLD_SIZE-player.radius, player.y));
                checkStealth(player);
            } else if (menuActive) { camera.x += Math.cos(Date.now()*0.0005)*2; camera.y += Math.sin(Date.now()*0.0005)*2; }

            const entities = gameActive ? [player, ...bots] : bots;
            entities.forEach(ent => {
                for (let i = xpGems.length-1; i >= 0; i--) {
                    if (Math.hypot(ent.x - xpGems[i].x, ent.y - xpGems[i].y) < ent.radius+15) {
                        ent.xp += xpGems[i].val; ent.totalXp += xpGems[i].val; xpGems.splice(i, 1);
                        if (xpGems.length < 120) spawnGem();
                    }
                }
                if (ent.xp >= ent.nextLevel) {
                    ent.tier++; ent.xp -= ent.nextLevel; ent.nextLevel = Math.floor(ent.nextLevel * 1.8);
                    ent.scale += 0.12; ent.radius = 30 * ent.scale; ent.maxHp += 40; ent.hp = ent.maxHp;
                }
            });

            bots.forEach((bot, idx) => {
                checkStealth(bot);
                let target = null, dMin = 600;
                entities.forEach(e => { if(e!==bot && !e.hidden){ let d=Math.hypot(e.x-bot.x, e.y-bot.y); if(d<dMin){ dMin=d; target=e; }} });

                if (target) {
                    bot.angle = Math.atan2(target.y-bot.y, target.x-bot.x);
                    bot.x += Math.cos(bot.angle)*bot.speed; bot.y += Math.sin(bot.angle)*bot.speed;
                    if (dMin < 150*bot.scale && !bot.isAttacking && Math.random()<0.05) { bot.isAttacking = true; bot.swingProgress = 0; bot.hitList.clear(); }
                } else {
                    if(bot.wanderTime <= 0) { bot.wanderAngle = Math.random() * Math.PI * 2; bot.wanderTime = 60 + Math.random() * 120; }
                    bot.x += Math.cos(bot.wanderAngle) * (bot.speed * 0.6); bot.y += Math.sin(bot.wanderAngle) * (bot.speed * 0.6);
                    bot.angle = bot.wanderAngle; bot.wanderTime--;
                }

                bot.x += bot.kx; bot.y += bot.ky; bot.kx *= 0.85; bot.ky *= 0.85;
                bot.x = Math.max(bot.radius, Math.min(WORLD_SIZE-bot.radius, bot.x));
                bot.y = Math.max(bot.radius, Math.min(WORLD_SIZE-bot.radius, bot.y));

                entities.forEach(atk => {
                    if (atk !== bot && atk.isAttacking && !atk.hitList.has(bot.id) && Math.hypot(atk.x-bot.x, atk.y-bot.y) < 145*atk.scale) {
                        let dmg = Math.floor(20*atk.scale); bot.hp -= dmg; atk.hitList.add(bot.id);
                        bot.kx = Math.cos(Math.atan2(bot.y-atk.y, bot.x-atk.x))*18; bot.ky = Math.sin(Math.atan2(bot.y-atk.y, bot.x-atk.x))*18;
                        addDamageText(bot.x, bot.y, dmg, atk.isPlayer ? "#ffeb3b" : "#ff5252");
                        if (bot.hp <= 0) { atk.kills++; atk.xp += 100*bot.tier; if(atk.isPlayer) kills++; }
                    }
                });
                if (gameActive && bot.isAttacking && !bot.hitList.has('player') && Math.hypot(bot.x-player.x, bot.y-player.y) < 130*bot.scale) {
                    let dmg = Math.floor(10*bot.scale); player.hp -= dmg; bot.hitList.add('player');
                    addDamageText(player.x, player.y, dmg, "#ff1744");
                    player.kx = Math.cos(Math.atan2(player.y-bot.y, player.x-bot.x))*12; player.ky = Math.sin(Math.atan2(player.y-bot.y, player.x-bot.x))*12;
                }
                entities.forEach(other => { if(bot !== other) resolveCollision(bot, other); });
                if (bot.hp <= 0) { for(let i=0; i<5; i++) spawnGem(bot.x, bot.y, 40); bots.splice(idx, 1); spawnBot(); }
            });

            for (let i = damageTexts.length-1; i >= 0; i--) { damageTexts[i].y += damageTexts[i].vy; damageTexts[i].life -= 0.02; if(damageTexts[i].life <= 0) damageTexts.splice(i, 1); }
            const ranked = [player, ...bots].sort((a,b)=>b.totalXp - a.totalXp).slice(0, 5);
            lbList.innerHTML = ranked.map((e,i)=>`<div class="lb-entry ${e.isPlayer?'lb-me':''}"><span>${i+1}. ${e.name}</span><span>${Math.floor(e.totalXp)}</span></div>`).join('');
        }

        function draw() {
            ctx.fillStyle = '#111'; ctx.fillRect(0,0,w,h);
            update();
            ctx.save(); ctx.translate(w/2, h/2); ctx.scale(camera.zoom, camera.zoom); ctx.translate(-camera.x, -camera.y);
            ctx.fillStyle = currentTheme.bg; ctx.fillRect(0,0,WORLD_SIZE, WORLD_SIZE);
            ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 2;
            for(let x=0; x<=WORLD_SIZE; x+=200) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x, WORLD_SIZE); ctx.stroke(); }
            for(let y=0; y<=WORLD_SIZE; y+=200) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(WORLD_SIZE, y); ctx.stroke(); }
            ctx.fillStyle = currentTheme.gem; xpGems.forEach(g => { ctx.beginPath(); ctx.arc(g.x, g.y, g.size, 0, Math.PI*2); ctx.fill(); });
            
            bots.forEach(b => drawBody(b, b.x, b.y));
            if (gameActive && player.hp > 0) {
                if(player.dashTimer > 0) { ctx.globalAlpha = 0.4; drawBody(player, player.x-Math.cos(player.angle)*25, player.y-Math.sin(player.angle)*25); ctx.globalAlpha = 1; }
                drawBody(player, player.x, player.y);
            }
            
            ctx.fillStyle = currentTheme.bush; 
            bushes.forEach(b => b.parts.forEach(p => { 
                ctx.beginPath(); ctx.arc(b.x+p.ox, b.y+p.oy, p.r, 0, Math.PI*2); ctx.fill(); 
            }));

            damageTexts.forEach(d => { ctx.save(); ctx.globalAlpha = d.life; ctx.fillStyle = d.color; ctx.font = "bold 28px Arial"; ctx.textAlign = "center"; ctx.fillText(d.text, d.x, d.y); ctx.restore(); });
            ctx.strokeStyle = '#ff1744'; ctx.lineWidth = 15; ctx.strokeRect(0,0,WORLD_SIZE, WORLD_SIZE);
            ctx.restore();
            
            if (gameActive) {
                miniCtx.fillStyle = '#000'; miniCtx.fillRect(0,0,160,160);
                const s = 160 / WORLD_SIZE;
                miniCtx.fillStyle = 'red'; bots.forEach(b => { if(!b.hidden) miniCtx.fillRect(b.x*s, b.y*s, 2, 2); });
                miniCtx.fillStyle = '#00e676'; miniCtx.fillRect(player.x*s-2, player.y*s-2, 4, 4);
                document.getElementById('xp-display').innerText = `XP: ${Math.floor(player.xp)} / ${player.nextLevel} (Tier ${player.tier})`;
                document.getElementById('score').innerText = "Kills: " + kills;
            }
            requestAnimationFrame(draw);
        }
        window.onresize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
        draw();
    </script>
</body>
</html>
